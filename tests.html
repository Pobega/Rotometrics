  <!-- Pokédex pure-logic tests (bst / sortDex / filterDex) -->
  <script type="module">
    import { bst, sortDex, filterDex, STAT_KEYS, isHiddenForm, isRegulationMALegal } from './src/data/dex.js';

    const results = document.getElementById('results');
    const summary = document.getElementById('summary');

    // Row factory: details=null means "not yet loaded".
    const stats = (hp, atk, def, spa, spd, spe) => ({ hp, atk, def, spa, spd, spe });
    const row = (name, baseStats, abilities) => ({
      apiName: name.toLowerCase(),
      name,
      details: baseStats ? { name, baseStats, abilities: (abilities || []).map(n => ({ name: n, apiName: n.toLowerCase() })) } : null,
    });

    const names = (rows) => rows.map(r => r.name);
    const eq = (a, b) => JSON.stringify(a) === JSON.stringify(b);

    const DEX_CASES = [
      {
        name: 'bst sums the six base stats',
        run: () => bst(stats(1, 2, 3, 4, 5, 6)) === 21 && STAT_KEYS.length === 6,
      },
      {
        name: 'sortDex by atk desc, then asc reverses order',
        run: () => {
          const rows = [
            row('Alpha', stats(100, 50, 100, 100, 100, 100)),
            row('Bravo', stats(100, 130, 100, 100, 100, 100)),
            row('Charlie', stats(100, 90, 100, 100, 100, 100)),
          ];
          const desc = names(sortDex(rows, 'atk', 'desc'));
          const asc = names(sortDex(rows, 'atk', 'asc'));
          return eq(desc, ['Bravo', 'Charlie', 'Alpha']) && eq(asc, ['Alpha', 'Charlie', 'Bravo']);
        },
      },
      {
        name: 'sortDex is stable on ties',
        run: () => {
          const rows = [
            row('First', stats(100, 80, 100, 100, 100, 100)),
            row('Second', stats(100, 80, 100, 100, 100, 100)),
            row('Third', stats(100, 80, 100, 100, 100, 100)),
          ];
          return eq(names(sortDex(rows, 'atk', 'desc')), ['First', 'Second', 'Third']);
        },
      },
      {
        name: 'sortDex sinks null-detail rows to the end (both directions)',
        run: () => {
          const rows = [
            row('Loaded', stats(100, 90, 100, 100, 100, 100)),
            row('Pending', null),
            row('Other', stats(100, 60, 100, 100, 100, 100)),
          ];
          const desc = names(sortDex(rows, 'atk', 'desc'));
          const asc = names(sortDex(rows, 'atk', 'asc'));
          return desc[desc.length - 1] === 'Pending' && asc[asc.length - 1] === 'Pending';
        },
      },
      {
        name: 'sortDex by bst uses the stat total',
        run: () => {
          const rows = [
            row('Low', stats(50, 50, 50, 50, 50, 50)),   // 300
            row('High', stats(100, 100, 100, 100, 100, 100)), // 600
          ];
          return eq(names(sortDex(rows, 'bst', 'desc')), ['High', 'Low']);
        },
      },
      {
        name: 'filterDex matches by name',
        run: () => {
          const rows = [row('Charizard', stats(78, 84, 78, 109, 85, 100), ['Blaze']), row('Garchomp', stats(108, 130, 95, 80, 85, 102), ['Rough Skin'])];
          return eq(names(filterDex(rows, 'char')), ['Charizard']);
        },
      },
      {
        name: 'filterDex matches by ability name',
        run: () => {
          const rows = [row('Gyarados', stats(95, 125, 79, 60, 100, 81), ['Intimidate']), row('Magikarp', stats(20, 10, 55, 15, 20, 80), ['Swift Swim'])];
          return eq(names(filterDex(rows, 'intimidate')), ['Gyarados']);
        },
      },
      {
        name: 'filterDex falls back to name-only when details absent',
        run: () => {
          const rows = [row('Pending', null), row('Other', null)];
          // ability query should match nothing (no details), name query still works
          return filterDex(rows, 'intimidate').length === 0 && eq(names(filterDex(rows, 'pend')), ['Pending']);
        },
      },
      {
        name: 'filterDex returns all rows for empty query',
        run: () => {
          const rows = [row('A', stats(1, 1, 1, 1, 1, 1)), row('B', null)];
          return filterDex(rows, '   ').length === 2;
        },
      },
      {
        name: 'isHiddenForm hides ride/gimmick/cosmetic forms',
        run: () => [
          'koraidon-sprinting-build', 'miraidon-aquatic-mode',
          'charizard-gmax', 'eternatus-eternamax', 'marowak-totem',
          'mimikyu-totem-disguised', 'pikachu-libre', 'pikachu-world-cap',
          'eevee-starter', 'mimikyu-busted', 'morpeko-hangry',
          'cramorant-gulping', 'tatsugiri-droopy', 'maushold-family-of-three',
          'minior-blue', 'minior-orange',
        ].every(isHiddenForm),
      },
      {
        name: 'isHiddenForm keeps real forms and distinct species',
        run: () => [
          'charizard', 'charizard-mega-x', 'ninetales-alola', 'rotom-heat',
          'aegislash-blade', 'gourgeist-small', 'castform-sunny',
          'minior-red-meteor', 'minior-red', 'mr-rime', 'mr-mime', 'iron-hands',
          'tapu-koko', 'nidoran-f',
        ].every(n => !isHiddenForm(n)),
      },

      // ---- isRegulationMALegal (legal set injected as a param) ----
      {
        name: 'isRegulationMALegal: legal base species matches',
        run: () => isRegulationMALegal('incineroar', new Set(['incineroar', 'charizard'])) === true,
      },
      {
        name: 'isRegulationMALegal: a form of a legal base matches (charizard-mega-x)',
        run: () => isRegulationMALegal('charizard-mega-x', new Set(['charizard'])) === true,
      },
      {
        name: 'isRegulationMALegal: trailing-hyphen guard — base mew does not match mewtwo',
        run: () => isRegulationMALegal('mewtwo', new Set(['mew'])) === false
          && isRegulationMALegal('mew', new Set(['mew'])) === true,
      },
      {
        name: 'isRegulationMALegal: hyphenated base name (kommo-o) matches itself and its forms',
        run: () => isRegulationMALegal('kommo-o', new Set(['kommo-o'])) === true
          && isRegulationMALegal('kommo-o-totem', new Set(['kommo-o'])) === false, // totem is a non-legal form
      },
      {
        name: 'isRegulationMALegal: NON_LEGAL_FORMS excluded even if base is legal (charizard-gmax)',
        run: () => isRegulationMALegal('charizard-gmax', new Set(['charizard'])) === false,
      },
      {
        name: 'isRegulationMALegal: a non-legal species is rejected',
        run: () => isRegulationMALegal('garchomp', new Set(['incineroar'])) === false,
      },
      {
        name: 'isRegulationMALegal: null/empty inputs return false',
        run: () => isRegulationMALegal('incineroar', null) === false
          && isRegulationMALegal('', new Set(['incineroar'])) === false,
      },
    ];

    let dexFail = 0;
    for (const c of DEX_CASES) {
      let ok = false;
      let err = null;
      try { ok = !!c.run(); } catch (e) { err = e; }
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = ok
        ? `<div class="name">✓ [dex] ${c.name}</div>`
        : `<div class="name">✗ [dex] ${c.name}</div><div class="detail">${err ? err.message : 'assertion failed'}</div>`;
      results.appendChild(div);
      if (!ok) dexFail++;

    // Keep the overall summary honest if a dex test regressed.
    if (dexFail > 0) {
      summary.textContent = `${summary.textContent} · ${dexFail} dex failure${dexFail === 1 ? '' : 's'}`;
      summary.classList.remove('pass');
      summary.classList.add('fail');
    }
  </script>

  <!-- EV/nature optimizer goldens (optimizeSurvival / optimizeOffensive) -->
  <script type="module">
    import { optimizeSurvivalEVsWithNatures, optimizeOffensiveEVsWithNatures } from './src/engine/optimize.js';

    const results = document.getElementById('results');
    const summary = document.getElementById('summary');

    const MON = (o = {}) => ({
      baseStats: { hp: 100, atk: 100, def: 100, spa: 100, spd: 100, spe: 100 },
      sps:       { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 },
      ivs:       { hp: 31, atk: 31, def: 31, spa: 31, spd: 31, spe: 31 },
      boosts:    { atk: 0, spa: 0, def: 0, spd: 0, spe: 0 },
      nature: 'neutral', item: 'none', ability: 'none', types: ['Normal'], ...o,
    });
    const FIRE_BLAST = { apiName: 'fire-blast', type: 'Fire', power: 110, category: 'special' };
    const WEAK = { apiName: 'weak', type: 'Normal', power: 10, category: 'physical' };
    const eq = (a, b) => JSON.stringify(a) === JSON.stringify(b);

    const OPT_CASES = [
      {
        // Fire-blast STAB vs a Grass defender just bulky enough that 0 SpA SP
        // doesn't OHKO on the low roll, but 5 SP (+spa) does. Exercises the
        // search's "cheapest nonzero SP" path.
        name: 'offensive: cheapest SP/nature for an OHKO',
        run: () => eq(
          optimizeOffensiveEVsWithNatures(
            MON({ types: ['Fire'], baseStats: { hp:100,atk:100,def:100,spa:140,spd:100,spe:100 } }),
            MON({ types: ['Grass'], baseStats: { hp:112,atk:100,def:100,spa:100,spd:100,spe:100 } }),
            FIRE_BLAST, {}, 'ohko', null),
          { sp: 5, nature: '+spa' }),
      },
      {
        name: 'offensive: unreachable OHKO returns null',
        run: () => optimizeOffensiveEVsWithNatures(
          MON(), MON({ baseStats: { hp:200,atk:100,def:150,spa:100,spd:100,spe:100 } }),
          WEAK, {}, 'ohko', null) === null,
      },
      {
        // A +spa Fire-blast attacker; the 100/100/100 Grass defender needs 10 SP
        // into SpD (+spd nature) to survive the high roll.
        name: 'survival: cheapest HP/SpD spread + nature to survive',
        run: () => eq(
          optimizeSurvivalEVsWithNatures(
            MON({ types: ['Fire'], nature: '+spa', sps: { hp:0,atk:0,def:0,spa:32,spd:0,spe:0 } }),
            MON({ types: ['Grass'] }), FIRE_BLAST, {}, null),
          { hp: 0, def: 10, nature: '+spd', total: 10 }),
      },
      {
        name: 'survival: unsurvivable hit returns null',
        run: () => optimizeSurvivalEVsWithNatures(
          MON({ types: ['Fire'], nature: '+spa', sps: { hp:0,atk:0,def:0,spa:32,spd:0,spe:0 } }),
          MON({ types: ['Grass'], baseStats: { hp:40,atk:100,def:60,spa:100,spd:60,spe:100 } }),
          FIRE_BLAST, {}, null) === null,
      },
      {
        name: 'survival: allowedNatures filter is respected (+spd only)',
        run: () => eq(
          optimizeSurvivalEVsWithNatures(
            MON({ types: ['Fire'], nature: '+spa', sps: { hp:0,atk:0,def:0,spa:32,spd:0,spe:0 } }),
            MON({ types: ['Grass'] }), FIRE_BLAST, {}, ['+spd']),
          { hp: 0, def: 10, nature: '+spd', total: 10 }),
      },
      {
        // The optimizers clone their actors internally (structuredClone); they
        // must never mutate the caller's attacker/defender objects.
        name: 'inputs are not mutated by the search',
        run: () => {
          const atk = MON({ types: ['Fire'], baseStats: { hp:100,atk:100,def:100,spa:140,spd:100,spe:100 } });
          const def = MON({ types: ['Grass'] });
          const atkBefore = JSON.stringify(atk), defBefore = JSON.stringify(def);
          optimizeOffensiveEVsWithNatures(atk, def, FIRE_BLAST, {}, 'ohko', null);
          optimizeSurvivalEVsWithNatures(atk, def, FIRE_BLAST, {}, null);
          return JSON.stringify(atk) === atkBefore && JSON.stringify(def) === defBefore;
        },
      },
    ];

    let optFail = 0;
    for (const c of OPT_CASES) {

      results.appendChild(div);
      if (!ok) optFail++;
    }

    // Keep the overall summary honest if an optimizer test regressed.
    if (optFail > 0) {
      summary.textContent = `${summary.textContent} · ${optFail} optimizer failure${optFail === 1 ? '' : 's'}`;
      summary.classList.remove('pass');
      summary.classList.add('fail');

  <!-- Cache versioning (cacheKey / pruneOldCaches) -->
  <script type="module">
    import { CACHE_VERSION, cacheKey, pruneOldCaches } from './src/api/cache.js';

    const results = document.getElementById('results');
    const summary = document.getElementById('summary');

    // pruneOldCaches mutates the real localStorage (same origin as the app), so
    // each case snapshots and restores it around the test to stay hermetic.
    const withCleanStorage = (fn) => {
      const snapshot = {};
      for (const k of Object.keys(localStorage)) snapshot[k] = localStorage.getItem(k);
      try {
        localStorage.clear();
        return fn();
      } finally {
        localStorage.clear();
        for (const k of Object.keys(snapshot)) localStorage.setItem(k, snapshot[k]);
      }
    };

    const CACHE_CASES = [
      {
        name: 'cacheKey namespaces and versions the name',
        run: () => cacheKey('pokemon_list') === `vgc_v${CACHE_VERSION}_pokemon_list`,
      },
      {
        name: 'pruneOldCaches drops legacy un-namespaced keys',
        run: () => withCleanStorage(() => {
          localStorage.setItem('vgc_opt_pokemon_list_v3', '["x"]');
          localStorage.setItem('poke_details_v6_pikachu', '{}');
          localStorage.setItem('move_details_tackle', '{}');
          pruneOldCaches();
          return !localStorage.getItem('vgc_opt_pokemon_list_v3')
            && !localStorage.getItem('poke_details_v6_pikachu')
            && !localStorage.getItem('move_details_tackle');
        }),
      },
      {
        name: 'pruneOldCaches drops stale-version keys (older and newer)',
        run: () => withCleanStorage(() => {
          localStorage.setItem('vgc_v1_pokemon_list', '[]');
          localStorage.setItem(`vgc_v${CACHE_VERSION + 1}_pokemon_list`, '[]');
          pruneOldCaches();
          return !localStorage.getItem('vgc_v1_pokemon_list')
            && !localStorage.getItem(`vgc_v${CACHE_VERSION + 1}_pokemon_list`);
        }),
      },
      {
        name: 'pruneOldCaches keeps current-version and unrelated keys',
        run: () => withCleanStorage(() => {
          localStorage.setItem(cacheKey('pokemon_list'), '["keep"]');
          localStorage.setItem('some_other_app_key', 'leave me');
          pruneOldCaches();
          return localStorage.getItem(cacheKey('pokemon_list')) === '["keep"]'
            && localStorage.getItem('some_other_app_key') === 'leave me';
        }),
      },
    ];

    let cacheFail = 0;
    for (const c of CACHE_CASES) {
      let ok = false;
      let err = null;
      try { ok = !!c.run(); } catch (e) { err = e; }
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = ok
        ? `<div class="name">✓ [cache] ${c.name}</div>`
        : `<div class="name">✗ [cache] ${c.name}</div><div class="detail">${err ? err.message : 'assertion failed'}</div>`;
      results.appendChild(div);
      if (!ok) cacheFail++;
    }

    // Keep the overall summary honest if a cache test regressed.
    if (cacheFail > 0) {
      summary.textContent = `${summary.textContent} · ${cacheFail} cache failure${cacheFail === 1 ? '' : 's'}`;
      summary.classList.remove('pass');
      summary.classList.add('fail');
    }
  </script>
</body>
</html>
