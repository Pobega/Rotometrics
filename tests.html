  <!-- Shared tally so the headline reflects every test block below, not just the
       first. Each block calls recordSuite() with its pass/fail/snap counts; the
       headline aggregates them and the caret expands a per-suite breakdown. This
       plain script runs during parsing, before the deferred module blocks. -->
  <script>
    window.TESTS = { pass: 0, fail: 0, snap: 0, suites: [] };
    window.__summaryOpen = false;

    window.recordSuite = function (name, counts) {
      const c = { name, pass: counts.pass || 0, fail: counts.fail || 0, snap: counts.snap || 0 };
      window.TESTS.suites.push(c);
      window.TESTS.pass += c.pass;
      window.TESTS.fail += c.fail;
      window.TESTS.snap += c.snap;
      renderSummary();
    };

    window.renderSummary = function () {
      const t = window.TESTS;
      const total = t.pass + t.fail + t.snap;
      const open = window.__summaryOpen;
      const el = document.getElementById('summary');
      el.classList.remove('pass', 'fail');
      el.classList.add(t.fail === 0 ? 'pass' : 'fail');

      const rows = t.suites.map(s => {
        const bits = [`${s.pass} ✓`];
        if (s.fail) bits.push(`${s.fail} ✗`);
        if (s.snap) bits.push(`${s.snap} 📸`);
        return `<div class="suite-row ${s.fail ? 'fail' : 'pass'}"><span class="suite-name">${s.name}</span><span class="suite-count">${bits.join(' · ')}</span></div>`;
      }).join('');

      el.innerHTML =
        `<button type="button" class="summary-toggle" aria-expanded="${open ? 'true' : 'false'}">` +
          `<span>${t.pass} passed · ${t.fail} failed · ${t.snap} snapshot${t.snap === 1 ? '' : 's'} (of ${total})</span>` +
          `<span class="caret">${open ? '▾' : '▸'}</span>` +
        `</button>` +
        `<div class="suite-breakdown"${open ? '' : ' hidden'}>${rows}</div>`;

      el.querySelector('.summary-toggle').onclick = () => {
        window.__summaryOpen = !window.__summaryOpen;
        renderSummary();
      };
    };
  </script>

  <!-- Pokédex pure-logic tests (bst / sortDex / filterDex) -->
  <script type="module">
    import { bst, sortDex, filterDex, STAT_KEYS, isHiddenForm, isFormatLegal } from './src/data/dex.js';
    import { resolveLegalSet, resolveNonLegalForms, NON_LEGAL_FORMS, REGULATIONS } from './src/data/regulations.js';

    const results = document.getElementById('results');
    const summary = document.getElementById('summary');

    // Row factory: details=null means "not yet loaded".
    const stats = (hp, atk, def, spa, spd, spe) => ({ hp, atk, def, spa, spd, spe });
    const row = (name, baseStats, abilities) => ({
      apiName: name.toLowerCase(),
      name,
      details: baseStats ? { name, baseStats, abilities: (abilities || []).map(n => ({ name: n, apiName: n.toLowerCase() })) } : null,
    });
    // Richer factory for the multi-field search tests: also carries types + moves.
    const dexRow = (name, { types = [], abilities = [], moves = [] } = {}) => ({
      apiName: name.toLowerCase(),
      name,
      details: {
        name,
        baseStats: stats(1, 1, 1, 1, 1, 1),
        types,
        abilities: abilities.map(n => ({ name: n, apiName: n.toLowerCase() })),
        moves: moves.map(n => ({ name: n, apiName: n.toLowerCase() })),
      },
    });

    const names = (rows) => rows.map(r => r.name);
    const eq = (a, b) => JSON.stringify(a) === JSON.stringify(b);

    const DEX_CASES = [
      {
        name: 'bst sums the six base stats',
        run: () => bst(stats(1, 2, 3, 4, 5, 6)) === 21 && STAT_KEYS.length === 6,
      },
      {
        name: 'sortDex by atk desc, then asc reverses order',
        run: () => {
          const rows = [
            row('Alpha', stats(100, 50, 100, 100, 100, 100)),
            row('Bravo', stats(100, 130, 100, 100, 100, 100)),
            row('Charlie', stats(100, 90, 100, 100, 100, 100)),
          ];
          const desc = names(sortDex(rows, 'atk', 'desc'));
          const asc = names(sortDex(rows, 'atk', 'asc'));
          return eq(desc, ['Bravo', 'Charlie', 'Alpha']) && eq(asc, ['Alpha', 'Charlie', 'Bravo']);
        },
      },
      {
        name: 'sortDex is stable on ties',
        run: () => {
          const rows = [
            row('First', stats(100, 80, 100, 100, 100, 100)),
            row('Second', stats(100, 80, 100, 100, 100, 100)),
            row('Third', stats(100, 80, 100, 100, 100, 100)),
          ];
          return eq(names(sortDex(rows, 'atk', 'desc')), ['First', 'Second', 'Third']);
        },
      },
      {
        name: 'sortDex sinks null-detail rows to the end (both directions)',
        run: () => {
          const rows = [
            row('Loaded', stats(100, 90, 100, 100, 100, 100)),
            row('Pending', null),
            row('Other', stats(100, 60, 100, 100, 100, 100)),
          ];
          const desc = names(sortDex(rows, 'atk', 'desc'));
          const asc = names(sortDex(rows, 'atk', 'asc'));
          return desc[desc.length - 1] === 'Pending' && asc[asc.length - 1] === 'Pending';
        },
      },
      {
        name: 'sortDex by bst uses the stat total',
        run: () => {
          const rows = [
            row('Low', stats(50, 50, 50, 50, 50, 50)),   // 300
            row('High', stats(100, 100, 100, 100, 100, 100)), // 600
          ];
          return eq(names(sortDex(rows, 'bst', 'desc')), ['High', 'Low']);
        },
      },
      {
        name: 'filterDex matches by name',
        run: () => {
          const rows = [row('Charizard', stats(78, 84, 78, 109, 85, 100), ['Blaze']), row('Garchomp', stats(108, 130, 95, 80, 85, 102), ['Rough Skin'])];
          return eq(names(filterDex(rows, 'char')), ['Charizard']);
        },
      },
      {
        name: 'filterDex matches by ability name',
        run: () => {
          const rows = [row('Gyarados', stats(95, 125, 79, 60, 100, 81), ['Intimidate']), row('Magikarp', stats(20, 10, 55, 15, 20, 80), ['Swift Swim'])];
          return eq(names(filterDex(rows, 'intimidate')), ['Gyarados']);
        },
      },
      {
        name: 'filterDex matches by move name',
        run: () => {
          const rows = [
            dexRow('Liepard', { moves: ['Encore', 'Fake Out'] }),
            dexRow('Snorlax', { moves: ['Body Slam'] }),
          ];
          return eq(names(filterDex(rows, ['encore'])), ['Liepard']);
        },
      },
      {
        name: 'filterDex exact-type term matches by type, not move/ability text',
        run: () => {
          const rows = [
            dexRow('Sableye', { types: ['Dark', 'Ghost'], moves: ['Encore'] }),
            // Normal-type that learns a "Dark"-named move must NOT match the "dark" type chip.
            dexRow('Snorlax', { types: ['Normal'], moves: ['Dark Pulse'] }),
          ];
          return eq(names(filterDex(rows, ['dark'])), ['Sableye']);
        },
      },
      {
        name: 'filterDex ANDs multiple terms across fields',
        run: () => {
          const rows = [
            dexRow('Liepard', { types: ['Dark'], abilities: ['Prankster'], moves: ['Encore'] }),
            dexRow('Sableye', { types: ['Dark', 'Ghost'], abilities: ['Prankster'], moves: ['Encore'] }),
            dexRow('Whimsicott', { types: ['Grass', 'Fairy'], abilities: ['Prankster'], moves: ['Encore'] }),
          ];
          // Prankster + Encore + Dark -> only the two Dark-types.
          return eq(names(filterDex(rows, ['prankster', 'encore', 'dark'])), ['Liepard', 'Sableye']);
        },
      },
      {
        name: 'filterDex falls back to name-only when details absent',
        run: () => {
          const rows = [row('Pending', null), row('Other', null)];
          // ability/type/move terms match nothing (no details), name term still works
          return filterDex(rows, 'intimidate').length === 0
            && filterDex(rows, ['dark']).length === 0
            && eq(names(filterDex(rows, 'pend')), ['Pending']);
        },
      },
      {
        name: 'filterDex returns all rows for empty/blank terms',
        run: () => {
          const rows = [row('A', stats(1, 1, 1, 1, 1, 1)), row('B', null)];
          return filterDex(rows, '   ').length === 2
            && filterDex(rows, []).length === 2
            && filterDex(rows, ['  ', '']).length === 2;
        },
      },
      {
        name: 'isHiddenForm hides ride/gimmick/cosmetic forms',
        run: () => [
          'koraidon-sprinting-build', 'miraidon-aquatic-mode',
          'charizard-gmax', 'eternatus-eternamax', 'marowak-totem',
          'mimikyu-totem-disguised', 'pikachu-libre', 'pikachu-world-cap',
          'eevee-starter', 'mimikyu-busted', 'morpeko-hangry',
          'cramorant-gulping', 'tatsugiri-droopy', 'maushold-family-of-three',
          'minior-blue', 'minior-orange',
        ].every(isHiddenForm),
      },
      {
        name: 'isHiddenForm keeps real forms and distinct species',
        run: () => [
          'charizard', 'charizard-mega-x', 'ninetales-alola', 'rotom-heat',
          'aegislash-blade', 'gourgeist-small', 'castform-sunny',
          'minior-red-meteor', 'minior-red', 'mr-rime', 'mr-mime', 'iron-hands',
          'tapu-koko', 'nidoran-f',
        ].every(n => !isHiddenForm(n)),
      },

      // ---- isFormatLegal (legal set injected as a param) ----
      {
        name: 'isFormatLegal: legal base species matches',
        run: () => isFormatLegal('incineroar', new Set(['incineroar', 'charizard'])) === true,
      },
      {
        name: 'isFormatLegal: a Mega of a legal base is legal when the regulation re-allows -mega (M-A)',
        run: () => isFormatLegal('charizard-mega-x', new Set(['charizard']), resolveNonLegalForms(REGULATIONS.regulation_ma)) === true,
      },
      {
        name: 'isFormatLegal: Megas are banned by default (no per-regulation legalForms)',
        run: () => isFormatLegal('charizard-mega-x', new Set(['charizard'])) === false,
      },
      {
        name: 'isFormatLegal: trailing-hyphen guard — base mew does not match mewtwo',
        run: () => isFormatLegal('mewtwo', new Set(['mew'])) === false
          && isFormatLegal('mew', new Set(['mew'])) === true,
      },
      {
        name: 'isFormatLegal: hyphenated base name (kommo-o) matches itself and its forms',
        run: () => isFormatLegal('kommo-o', new Set(['kommo-o'])) === true
          && isFormatLegal('kommo-o-totem', new Set(['kommo-o'])) === false, // totem is a non-legal form
      },
      {
        name: 'isFormatLegal: NON_LEGAL_FORMS excluded even if base is legal (charizard-gmax)',
        run: () => isFormatLegal('charizard-gmax', new Set(['charizard'])) === false,
      },
      {
        name: 'isFormatLegal: a non-legal species is rejected',
        run: () => isFormatLegal('garchomp', new Set(['incineroar'])) === false,
      },
      {
        name: 'isFormatLegal: null/empty inputs return false',
        run: () => isFormatLegal('incineroar', null) === false
          && isFormatLegal('', new Set(['incineroar'])) === false,
      },
      {
        name: 'isFormatLegal: Eternal Floette + Mega Floette are legal under M-A (re-allows -eternal/-mega)',
        run: () => {
          const forms = resolveNonLegalForms(REGULATIONS.regulation_ma);
          return isFormatLegal('floette', new Set(['floette']), forms) === true
            && isFormatLegal('floette-eternal', new Set(['floette']), forms) === true
            && isFormatLegal('floette-mega', new Set(['floette']), forms) === true;
        },
      },
      {
        name: 'isFormatLegal: re-allowing -mega still bans the more-specific -mega-z',
        run: () => {
          const forms = resolveNonLegalForms({ legalForms: ['-mega'] });
          return isFormatLegal('charizard-mega-x', new Set(['charizard']), forms) === true
            && isFormatLegal('lucario-mega-z', new Set(['lucario']), forms) === false;
        },
      },

      // ---- resolveNonLegalForms (global bans minus the regulation's legalForms) ----
      {
        name: 'resolveNonLegalForms: removes the regulation\'s re-allowed suffixes, keeps the rest',
        run: () => {
          const forms = resolveNonLegalForms(REGULATIONS.regulation_ma);
          return !forms.includes('-mega') && !forms.includes('-eternal')
            && forms.includes('-mega-z') && forms.includes('-gmax');
        },
      },
      {
        name: 'resolveNonLegalForms: no legalForms returns the full global list',
        run: () => {
          const forms = resolveNonLegalForms({});
          return forms.length === NON_LEGAL_FORMS.length && forms.includes('-mega');
        },
      },

      // ---- resolveLegalSet (roster + per-regulation include/exclude delta) ----
      {
        name: 'resolveLegalSet: empty delta returns the roster unchanged',
        run: () => {
          const s = resolveLegalSet(['charizard', 'incineroar'], { include: [], exclude: [] });
          return s.size === 2 && s.has('charizard') && s.has('incineroar');
        },
      },
      {
        name: 'resolveLegalSet: exclude drops a roster species',
        run: () => {
          const s = resolveLegalSet(['charizard', 'incineroar'], { exclude: ['incineroar'] });
          return s.has('charizard') && !s.has('incineroar');
        },
      },
      {
        name: 'resolveLegalSet: include adds a species beyond the roster',
        run: () => {
          const s = resolveLegalSet(['charizard'], { include: ['miraidon'] });
          return s.has('charizard') && s.has('miraidon');
        },
      },
      {
        name: 'resolveLegalSet: missing include/exclude keys are treated as empty',
        run: () => {
          const s = resolveLegalSet(['charizard'], {});
          return s.size === 1 && s.has('charizard');
        },
      },
    ];

    let dexFail = 0;
    for (const c of DEX_CASES) {
      let ok = false;
      let err = null;
      try { ok = !!c.run(); } catch (e) { err = e; }
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = ok
        ? `<div class="name">✓ [dex] ${c.name}</div>`
        : `<div class="name">✗ [dex] ${c.name}</div><div class="detail">${err ? err.message : 'assertion failed'}</div>`;
      results.appendChild(div);
      if (!ok) dexFail++;
    }

    // Keep the overall summary honest if a dex test regressed.
    recordSuite('dex', { pass: DEX_CASES.length - dexFail, fail: dexFail });
  </script>

  <!-- Attackdex pure-logic tests (sortMoves / filterMoves / spreadKind) -->
  <script type="module">
    import { sortMoves, filterMoves, spreadKind, isSpreadMove } from './src/data/moves.js';

    const results = document.getElementById('results');

    // Row factory: details=null means "not yet loaded". Carries the move fields
    // the filters/sorts read (type, category, power, pp, desc, target, learnedBy).
    const moveRow = (name, details) => ({
      apiName: name.toLowerCase().replace(/ /g, '-'),
      name,
      details: details ? { name, ...details } : null,
    });
    const names = (rows) => rows.map(r => r.name);
    const eq = (a, b) => JSON.stringify(a) === JSON.stringify(b);

    const MOVE_CASES = [
      {
        name: 'sortMoves by power desc, then asc reverses (nulls sink either way)',
        run: () => {
          const rows = [
            moveRow('Ember', { power: 40 }),
            moveRow('Flamethrower', { power: 90 }),
            moveRow('Growl', { power: null }),
          ];
          const desc = names(sortMoves(rows, 'power', 'desc'));
          const asc = names(sortMoves(rows, 'power', 'asc'));
          return eq(desc, ['Flamethrower', 'Ember', 'Growl'])
            && asc[asc.length - 1] === 'Growl' && asc[0] === 'Ember';
        },
      },
      {
        name: 'filterMoves matches by name',
        run: () => {
          const rows = [moveRow('Fire Punch', { type: 'Fire' }), moveRow('Ice Punch', { type: 'Ice' })];
          return eq(names(filterMoves(rows, 'ice')), ['Ice Punch']);
        },
      },
      {
        name: 'filterMoves matches by description',
        run: () => {
          const rows = [
            moveRow('Scald', { type: 'Water', desc: 'May leave the target with a burn.' }),
            moveRow('Surf', { type: 'Water', desc: 'Hits all adjacent Pokémon.' }),
          ];
          return eq(names(filterMoves(rows, ['burn'])), ['Scald']);
        },
      },
      {
        name: 'filterMoves matches by learner name (inverse search-by-move)',
        run: () => {
          const rows = [
            moveRow('Spikes', { type: 'Ground', learnedBy: ['garchomp', 'skarmory'] }),
            moveRow('Roost', { type: 'Flying', learnedBy: ['skarmory'] }),
          ];
          return eq(names(filterMoves(rows, ['garchomp'])), ['Spikes']);
        },
      },
      {
        name: 'filterMoves learner match normalizes hyphens to spaces',
        run: () => {
          const rows = [moveRow('Fake Out', { type: 'Normal', learnedBy: ['iron-hands'] })];
          return eq(names(filterMoves(rows, ['iron hands'])), ['Fake Out']);
        },
      },
      {
        name: 'filterMoves type keyword filters by move type, not name/desc text',
        run: () => {
          const rows = [
            moveRow('Flamethrower', { type: 'Fire', desc: 'Burns sometimes.' }),
            // Normal-type whose name/desc mention "fire" must NOT match the "fire" type chip.
            moveRow('Fire Fang Copy', { type: 'Normal', desc: 'A fiery-looking fire bite.' }),
          ];
          return eq(names(filterMoves(rows, ['fire'])), ['Flamethrower']);
        },
      },
      {
        name: 'filterMoves category keyword filters by category',
        run: () => {
          const rows = [
            moveRow('Thunder Wave', { type: 'Electric', category: 'status' }),
            moveRow('Thunderbolt', { type: 'Electric', category: 'special' }),
          ];
          return eq(names(filterMoves(rows, ['status'])), ['Thunder Wave']);
        },
      },
      {
        name: 'filterMoves spread keyword keeps multi-target moves',
        run: () => {
          const rows = [
            moveRow('Rock Slide', { type: 'Rock', target: 'all-opponents' }),
            moveRow('Earthquake', { type: 'Ground', target: 'all-other-pokemon' }),
            moveRow('Tackle', { type: 'Normal', target: 'selected-pokemon' }),
          ];
          return eq(names(filterMoves(rows, ['spread'])), ['Rock Slide', 'Earthquake']);
        },
      },
      {
        name: 'filterMoves ANDs multiple terms across fields',
        run: () => {
          const rows = [
            moveRow('Heat Wave', { type: 'Fire', category: 'special', target: 'all-opponents' }),
            moveRow('Flamethrower', { type: 'Fire', category: 'special', target: 'selected-pokemon' }),
            moveRow('Rock Slide', { type: 'Rock', category: 'physical', target: 'all-opponents' }),
          ];
          return eq(names(filterMoves(rows, ['fire', 'spread'])), ['Heat Wave']);
        },
      },
      {
        name: 'filterMoves falls back to name-only when details absent',
        run: () => {
          const rows = [moveRow('Pending Move', null), moveRow('Tackle', null)];
          return filterMoves(rows, 'fire').length === 0
            && filterMoves(rows, ['spread']).length === 0
            && eq(names(filterMoves(rows, 'pend')), ['Pending Move']);
        },
      },
      {
        name: 'filterMoves returns all rows for empty/blank terms',
        run: () => {
          const rows = [moveRow('Tackle', { type: 'Normal' }), moveRow('Growl', { type: 'Normal' })];
          return filterMoves(rows, '   ').length === 2
            && filterMoves(rows, []).length === 2
            && filterMoves(rows, ['  ', '']).length === 2;
        },
      },
      {
        name: 'filterMoves regulation gate keeps only moves with a legal learner',
        run: () => {
          const rows = [
            moveRow('Spikes', { type: 'Ground', learnedBy: ['garchomp', 'skarmory'] }),
            moveRow('Roost', { type: 'Flying', learnedBy: ['skarmory'] }),
          ];
          // Gate: only garchomp is legal. Spikes (garchomp learns it) stays; Roost drops.
          const gate = (n) => n === 'garchomp';
          return eq(names(filterMoves(rows, [], gate)), ['Spikes']);
        },
      },
      {
        name: 'filterMoves regulation gate ANDs with search terms',
        run: () => {
          const rows = [
            moveRow('Earthquake', { type: 'Ground', learnedBy: ['garchomp'] }),
            moveRow('Roost', { type: 'Flying', learnedBy: ['garchomp'] }),
          ];
          const gate = (n) => n === 'garchomp';
          return eq(names(filterMoves(rows, ['ground'], gate)), ['Earthquake']);
        },
      },
      {
        name: 'filterMoves regulation gate drops rows whose details (learners) are unloaded',
        run: () => {
          const rows = [moveRow('Pending Move', null)];
          return filterMoves(rows, [], () => true).length === 0;
        },
      },
      {
        name: 'spreadKind distinguishes opponents-only from ally-hitting, isSpreadMove agrees',
        run: () => {
          const opp = { target: 'all-opponents' };
          const ally = { target: 'all-other-pokemon' };
          const single = { target: 'selected-pokemon' };
          return spreadKind(opp) === 'opponents' && spreadKind(ally) === 'ally'
            && spreadKind(single) === null && spreadKind(null) === null
            && isSpreadMove(opp) && isSpreadMove(ally) && !isSpreadMove(single);
        },
      },
    ];

    let moveFail = 0;
    for (const c of MOVE_CASES) {
      let ok = false;
      let err = null;
      try { ok = !!c.run(); } catch (e) { err = e; }
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = ok
        ? `<div class="name">✓ [moves] ${c.name}</div>`
        : `<div class="name">✗ [moves] ${c.name}</div><div class="detail">${err ? err.message : 'assertion failed'}</div>`;
      results.appendChild(div);
      if (!ok) moveFail++;
    }

    recordSuite('moves', { pass: MOVE_CASES.length - moveFail, fail: moveFail });
  </script>

  <!-- Search-suggestion ranking tests (buildSuggestions) -->
  <script type="module">
    import { buildSuggestions } from './src/ui-preact/suggestions.js';

    const results = document.getElementById('results');
    const vals = (s) => s.map((x) => x.value);
    const eq = (a, b) => JSON.stringify(a) === JSON.stringify(b);

    // Sources mirror the real shape: ordered { kind, label, items } by priority.
    const SOURCES = [
      { kind: 'type', label: 'type', items: ['Dark', 'Dragon', 'Fire'] },
      { kind: 'pokemon', label: 'pokemon', items: ['Darkrai', 'Darmanitan', 'Charizard'] },
      { kind: 'ability', label: 'ability', items: ['Dark Aura', 'Levitate'] },
      { kind: 'move', label: 'move', items: ['Dark Pulse', 'Darkest Lariat', 'Tackle'] },
    ];

    const SUGGEST_CASES = [
      {
        name: 'empty / blank query returns nothing',
        run: () => buildSuggestions('', SOURCES).length === 0
          && buildSuggestions('   ', SOURCES).length === 0,
      },
      {
        name: 'round-robins one of each kind for "dark" (type, pokemon, ability)',
        run: () => {
          const s = buildSuggestions('dark', SOURCES);
          return eq(vals(s), ['Dark', 'Darkrai', 'Dark Aura'])
            && eq(s.map((x) => x.kind), ['type', 'pokemon', 'ability']);
        },
      },
      {
        name: 'respects the limit',
        run: () => buildSuggestions('dark', SOURCES, { limit: 2 }).length === 2,
      },
      {
        name: 'is case-insensitive',
        run: () => eq(vals(buildSuggestions('DARK', SOURCES, { limit: 1 })), ['Dark']),
      },
      {
        name: 'prefix matches rank above interior substring matches',
        run: () => {
          // "ar" is interior in Darkrai/Charizard but prefix in nothing here;
          // "char" is a prefix of Charizard only.
          const s = buildSuggestions('char', SOURCES, { limit: 3 });
          return eq(vals(s), ['Charizard']);
        },
      },
      {
        name: 'excludes already-committed values (case-insensitive)',
        run: () => {
          const s = buildSuggestions('dark', SOURCES, { exclude: new Set(['dark']) });
          // 'Dark' (type) is filtered out, so the type slot yields nothing and the
          // round-robin starts with the pokemon + ability picks.
          return !vals(s).includes('Dark') && vals(s).includes('Darkrai');
        },
      },
      {
        name: 'falls back to a single kind when only it matches',
        run: () => {
          const s = buildSuggestions('tackle', SOURCES);
          return eq(vals(s), ['Tackle']) && s[0].kind === 'move';
        },
      },
      {
        name: 'within a kind, shorter match wins the slot then alphabetical',
        run: () => {
          // Both pokemon start with "dar"; Darkrai (7) is shorter than Darmanitan (10).
          const s = buildSuggestions('dar', [SOURCES[1]], { limit: 2 });
          return eq(vals(s), ['Darkrai', 'Darmanitan']);
        },
      },
    ];

    let sugFail = 0;
    for (const c of SUGGEST_CASES) {
      let ok = false;
      let err = null;
      try { ok = !!c.run(); } catch (e) { err = e; }
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = ok
        ? `<div class="name">✓ [suggest] ${c.name}</div>`
        : `<div class="name">✗ [suggest] ${c.name}</div><div class="detail">${err ? err.message : 'assertion failed'}</div>`;
      results.appendChild(div);
      if (!ok) sugFail++;
    }

    recordSuite('suggest', { pass: SUGGEST_CASES.length - sugFail, fail: sugFail });
  </script>

  <!-- Abilitydex pure-logic tests (filterAbilities / sortAbilities / abilityTag) -->
  <script type="module">
    import { filterAbilities, sortAbilities, abilityTag, isVgcAbility } from './src/data/abilities.js';

    const results = document.getElementById('results');

    // Row factory: details null until "loaded" (mirrors the lazy-load shape).
    // Pass desc and/or holders to populate the loaded detail object.
    const abRow = (name, apiName, desc = null, pokemon = []) => ({
      apiName,
      name,
      details: desc === null && pokemon.length === 0 ? null : { name, apiName, desc, pokemon },
    });
    const names = (rows) => rows.map((r) => r.apiName);

    const ABILITY_CASES = [
      {
        name: 'abilityTag classifies offensive / defensive / neither',
        run: () =>
          abilityTag('huge-power') === 'off' &&
          abilityTag('multiscale') === 'def' &&
          abilityTag('run-away') === null &&
          isVgcAbility('huge-power') === true &&
          isVgcAbility('run-away') === false,
      },
      {
        name: 'sortAbilities orders by name (stable, asc/desc)',
        run: () => {
          const rows = [abRow('Sturdy', 'sturdy'), abRow('Adaptability', 'adaptability'), abRow('Mega Launcher', 'mega-launcher')];
          const asc = names(sortAbilities(rows, 'asc'));
          const desc = names(sortAbilities(rows, 'desc'));
          return JSON.stringify(asc) === JSON.stringify(['adaptability', 'mega-launcher', 'sturdy'])
            && JSON.stringify(desc) === JSON.stringify(['sturdy', 'mega-launcher', 'adaptability']);
        },
      },
      {
        name: 'filterAbilities: term matches the name',
        run: () => {
          const rows = [abRow('Intimidate', 'intimidate'), abRow('Levitate', 'levitate')];
          return names(filterAbilities(rows, 'intim')).join() === 'intimidate';
        },
      },
      {
        name: 'filterAbilities: term matches loaded effect text',
        run: () => {
          const rows = [
            abRow('Intimidate', 'intimidate', "Lowers the foe's Attack on entry."),
            abRow('Levitate', 'levitate', 'Immune to Ground-type moves.'),
          ];
          return names(filterAbilities(rows, ['ground'])).join() === 'levitate';
        },
      },
      {
        name: 'filterAbilities: term matches a holder Pokémon (inverse of "Pokémon with")',
        run: () => {
          const rows = [
            abRow('Sand Veil', 'sand-veil', 'Evasion up in sand.', ['garchomp', 'gliscor']),
            abRow('Levitate', 'levitate', 'Ground immunity.', ['rotom']),
          ];
          return names(filterAbilities(rows, ['garchomp'])).join() === 'sand-veil';
        },
      },
      {
        name: 'filterAbilities: holder match normalizes hyphens to spaces',
        run: () => {
          const rows = [abRow('Quark Drive', 'quark-drive', 'Paradox boost.', ['iron-hands'])];
          return names(filterAbilities(rows, ['iron hands'])).join() === 'quark-drive';
        },
      },
      {
        name: 'filterAbilities: an unloaded row matches by name or VGC keyword, not desc/holder',
        run: () => {
          const rows = [abRow('Levitate', 'levitate')]; // details null
          return filterAbilities(rows, ['ground']).length === 0
            && filterAbilities(rows, ['garchomp']).length === 0
            && filterAbilities(rows, 'levi').length === 1;
        },
      },
      {
        name: 'filterAbilities: offensive / defensive keywords filter by curated tag',
        run: () => {
          const rows = [abRow('Huge Power', 'huge-power'), abRow('Multiscale', 'multiscale'), abRow('Run Away', 'run-away')];
          return JSON.stringify(names(filterAbilities(rows, ['offensive']))) === JSON.stringify(['huge-power'])
            && JSON.stringify(names(filterAbilities(rows, ['defensive']))) === JSON.stringify(['multiscale']);
        },
      },
      {
        name: 'filterAbilities: ANDs multiple terms (offensive + holder)',
        run: () => {
          const rows = [
            abRow('Huge Power', 'huge-power', 'Doubles Attack.', ['azumarill']),
            abRow('Run Away', 'run-away', 'Always flee wild battles.', ['azumarill']),
          ];
          // run-away isn't offensive VGC, so only huge-power survives offensive + azumarill.
          return JSON.stringify(names(filterAbilities(rows, ['offensive', 'azumarill']))) === JSON.stringify(['huge-power']);
        },
      },
      {
        name: 'filterAbilities: empty/blank terms return every row',
        run: () => {
          const rows = [abRow('Huge Power', 'huge-power'), abRow('Run Away', 'run-away')];
          return filterAbilities(rows, '   ').length === 2
            && filterAbilities(rows, []).length === 2
            && filterAbilities(rows, ['  ', '']).length === 2;
        },
      },
      {
        name: 'filterAbilities: regulation gate keeps only abilities with a legal holder',
        run: () => {
          const rows = [
            abRow('Sand Veil', 'sand-veil', 'Evasion up in sand.', ['garchomp', 'gliscor']),
            abRow('Levitate', 'levitate', 'Ground immunity.', ['rotom']),
          ];
          const gate = (n) => n === 'garchomp';
          return JSON.stringify(names(filterAbilities(rows, [], gate))) === JSON.stringify(['sand-veil']);
        },
      },
      {
        name: 'filterAbilities: regulation gate ANDs with search terms and drops unloaded rows',
        run: () => {
          const rows = [
            abRow('Huge Power', 'huge-power', 'Doubles Attack.', ['azumarill']),
            abRow('Run Away', 'run-away', 'Always flee.', ['azumarill']),
            abRow('Levitate', 'levitate'), // details null — holder list unknown
          ];
          const gate = (n) => n === 'azumarill';
          return JSON.stringify(names(filterAbilities(rows, ['offensive'], gate))) === JSON.stringify(['huge-power'])
            && filterAbilities(rows, [], gate).length === 2; // levitate dropped (unloaded)
        },
      },
    ];

    let abFail = 0;
    for (const c of ABILITY_CASES) {
      let ok = false;
      let err = null;
      try { ok = !!c.run(); } catch (e) { err = e; }
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = ok
        ? `<div class="name">✓ [ability] ${c.name}</div>`
        : `<div class="name">✗ [ability] ${c.name}</div><div class="detail">${err ? err.message : 'assertion failed'}</div>`;
      results.appendChild(div);
      if (!ok) abFail++;

  <!-- EV/nature optimizer goldens (optimizeSurvival / optimizeOffensive) -->
  <script type="module">
    import { optimizeSurvivalEVsWithNatures, optimizeOffensiveEVsWithNatures } from './src/engine/optimize.js';

    const results = document.getElementById('results');
    const summary = document.getElementById('summary');

    const MON = (o = {}) => ({
      baseStats: { hp: 100, atk: 100, def: 100, spa: 100, spd: 100, spe: 100 },
      sps:       { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 },
      ivs:       { hp: 31, atk: 31, def: 31, spa: 31, spd: 31, spe: 31 },
      boosts:    { atk: 0, spa: 0, def: 0, spd: 0, spe: 0 },
      nature: 'neutral', item: 'none', ability: 'none', types: ['Normal'], ...o,
    });
    const FIRE_BLAST = { apiName: 'fire-blast', type: 'Fire', power: 110, category: 'special' };
    const WEAK = { apiName: 'weak', type: 'Normal', power: 10, category: 'physical' };
    const eq = (a, b) => JSON.stringify(a) === JSON.stringify(b);

    const OPT_CASES = [
      {
        // Fire-blast STAB vs a Grass defender just bulky enough that 0 SpA SP
        // doesn't OHKO on the low roll, but 5 SP (+spa) does. Exercises the
        // search's "cheapest nonzero SP" path.
        name: 'offensive: cheapest SP/nature for an OHKO',
        run: () => eq(
          optimizeOffensiveEVsWithNatures(
            MON({ types: ['Fire'], baseStats: { hp:100,atk:100,def:100,spa:140,spd:100,spe:100 } }),
            MON({ types: ['Grass'], baseStats: { hp:112,atk:100,def:100,spa:100,spd:100,spe:100 } }),
            FIRE_BLAST, {}, 'ohko', null),
          { sp: 5, nature: '+spa' }),
      },
      {
        name: 'offensive: unreachable OHKO returns null',
        run: () => optimizeOffensiveEVsWithNatures(
          MON(), MON({ baseStats: { hp:200,atk:100,def:150,spa:100,spd:100,spe:100 } }),
          WEAK, {}, 'ohko', null) === null,
      },
      {
        // A +spa Fire-blast attacker; the 100/100/100 Grass defender needs 10 SP
        // into SpD (+spd nature) to survive the high roll.
        name: 'survival: cheapest HP/SpD spread + nature to survive',
        run: () => eq(
          optimizeSurvivalEVsWithNatures(
            MON({ types: ['Fire'], nature: '+spa', sps: { hp:0,atk:0,def:0,spa:32,spd:0,spe:0 } }),
            MON({ types: ['Grass'] }), FIRE_BLAST, {}, null),
          { hp: 0, def: 10, nature: '+spd', total: 10 }),
      },
      {
        name: 'survival: unsurvivable hit returns null',
        run: () => optimizeSurvivalEVsWithNatures(
          MON({ types: ['Fire'], nature: '+spa', sps: { hp:0,atk:0,def:0,spa:32,spd:0,spe:0 } }),
          MON({ types: ['Grass'], baseStats: { hp:40,atk:100,def:60,spa:100,spd:60,spe:100 } }),
          FIRE_BLAST, {}, null) === null,
      },
      {
        name: 'survival: allowedNatures filter is respected (+spd only)',
        run: () => eq(
          optimizeSurvivalEVsWithNatures(
            MON({ types: ['Fire'], nature: '+spa', sps: { hp:0,atk:0,def:0,spa:32,spd:0,spe:0 } }),
            MON({ types: ['Grass'] }), FIRE_BLAST, {}, ['+spd']),
          { hp: 0, def: 10, nature: '+spd', total: 10 }),
      },
      {
        // The optimizers clone their actors internally (structuredClone); they
        // must never mutate the caller's attacker/defender objects.
        name: 'inputs are not mutated by the search',
        run: () => {
          const atk = MON({ types: ['Fire'], baseStats: { hp:100,atk:100,def:100,spa:140,spd:100,spe:100 } });
          const def = MON({ types: ['Grass'] });
          const atkBefore = JSON.stringify(atk), defBefore = JSON.stringify(def);
          optimizeOffensiveEVsWithNatures(atk, def, FIRE_BLAST, {}, 'ohko', null);
          optimizeSurvivalEVsWithNatures(atk, def, FIRE_BLAST, {}, null);
          return JSON.stringify(atk) === atkBefore && JSON.stringify(def) === defBefore;
        },
      },
    ];

    let optFail = 0;
    for (const c of OPT_CASES) {
      let ok = false;
      let err = null;
      try { ok = !!c.run(); } catch (e) { err = e; }
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = ok
        ? `<div class="name">✓ [opt] ${c.name}</div>`
        : `<div class="name">✗ [opt] ${c.name}</div><div class="detail">${err ? err.message : 'assertion failed'}</div>`;
      results.appendChild(div);
      if (!ok) optFail++;
    }

    // Keep the overall summary honest if an optimizer test regressed.
    recordSuite('opt', { pass: OPT_CASES.length - optFail, fail: optFail });
  </script>

  <!-- Cache versioning (cacheKey / pruneOldCaches) -->
  <script type="module">
    import { CACHE_VERSION, cacheKey, pruneOldCaches } from './src/api/cache.js';

    const results = document.getElementById('results');
    const summary = document.getElementById('summary');

    // pruneOldCaches mutates the real localStorage (same origin as the app), so
    // each case snapshots and restores it around the test to stay hermetic.
    const withCleanStorage = (fn) => {
      const snapshot = {};
      for (const k of Object.keys(localStorage)) snapshot[k] = localStorage.getItem(k);
      try {
        localStorage.clear();
        return fn();
      } finally {
        localStorage.clear();
        for (const k of Object.keys(snapshot)) localStorage.setItem(k, snapshot[k]);
      }
    };

    const CACHE_CASES = [
      {
        name: 'cacheKey namespaces and versions the name',
        run: () => cacheKey('pokemon_list') === `vgc_v${CACHE_VERSION}_pokemon_list`,
      },
      {
        name: 'pruneOldCaches drops legacy un-namespaced keys',
        run: () => withCleanStorage(() => {
          localStorage.setItem('vgc_opt_pokemon_list_v3', '["x"]');
          localStorage.setItem('poke_details_v6_pikachu', '{}');
          localStorage.setItem('move_details_tackle', '{}');
          pruneOldCaches();
          return !localStorage.getItem('vgc_opt_pokemon_list_v3')
            && !localStorage.getItem('poke_details_v6_pikachu')
            && !localStorage.getItem('move_details_tackle');
        }),
      },
      {
        name: 'pruneOldCaches drops stale-version keys (older and newer)',
        run: () => withCleanStorage(() => {
          localStorage.setItem('vgc_v1_pokemon_list', '[]');
          localStorage.setItem(`vgc_v${CACHE_VERSION + 1}_pokemon_list`, '[]');
          pruneOldCaches();
          return !localStorage.getItem('vgc_v1_pokemon_list')
            && !localStorage.getItem(`vgc_v${CACHE_VERSION + 1}_pokemon_list`);
        }),
      },
      {
        name: 'pruneOldCaches keeps current-version and unrelated keys',
        run: () => withCleanStorage(() => {
          localStorage.setItem(cacheKey('pokemon_list'), '["keep"]');
          localStorage.setItem('some_other_app_key', 'leave me');
          pruneOldCaches();
          return localStorage.getItem(cacheKey('pokemon_list')) === '["keep"]'
            && localStorage.getItem('some_other_app_key') === 'leave me';
        }),
      },
    ];

    let cacheFail = 0;
    for (const c of CACHE_CASES) {
      let ok = false;
      let err = null;
      try { ok = !!c.run(); } catch (e) { err = e; }
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = ok
        ? `<div class="name">✓ [cache] ${c.name}</div>`
        : `<div class="name">✗ [cache] ${c.name}</div><div class="detail">${err ? err.message : 'assertion failed'}</div>`;
      results.appendChild(div);
      if (!ok) cacheFail++;
    }

    // Keep the overall summary honest if a cache test regressed.
    recordSuite('cache', { pass: CACHE_CASES.length - cacheFail, fail: cacheFail });
  </script>

  <!-- Smart default-move pick (pickDefaultMove) tests -->
  <script type="module">
    import { pickDefaultMove } from './src/engine/default-move.js';

    const results = document.getElementById('results');

    // Convenience move factory; accuracy defaults to null (never-miss), target to
    // single ('selected-pokemon'). Pass a spread target to exercise the spread filter.
    const MV = (apiName, type, power, category, accuracy = null, target = 'selected-pokemon') =>
      ({ apiName, name: apiName, type, power, category, accuracy, target });
    const pickName = (args) => { const m = pickDefaultMove(args); return m ? m.apiName : null; };

    const DM_CASES = [
      {
        // The motivating bug: a physical Dark/Steel attacker should default to its
        // STAB Iron Head, not the alphabetically-first non-STAB Aerial Ace.
        name: 'prefers a STAB move over a non-STAB one (Kingambit case)',
        run: () => pickName({
          types: ['Dark', 'Steel'],
          baseStats: { hp: 100, atk: 135, def: 120, spa: 60, spd: 85, spe: 50 },
          moves: [ MV('aerial-ace', 'Flying', 60, 'physical'),
                   MV('iron-head', 'Steel', 80, 'physical'),
                   MV('sucker-punch', 'Dark', 70, 'physical') ],
        }) === 'iron-head',
      },
      {
        // Among STAB moves the highest base power wins.
        name: 'among STAB moves, picks the highest base power',
        run: () => pickName({
          types: ['Fire'],
          baseStats: { hp: 80, atk: 120, def: 80, spa: 80, spd: 80, spe: 80 },
          moves: [ MV('ember', 'Fire', 40, 'special'),
                   MV('flare-blitz', 'Fire', 120, 'physical'),
                   MV('flamethrower', 'Fire', 90, 'special') ],
        }) === 'flare-blitz',
      },
      {
        // Category scales off the higher attacking stat: equal-BP STAB moves of
        // each category, a special-leaning attacker takes the special one.
        name: 'scales off the higher attacking stat (special attacker)',
        run: () => pickName({
          types: ['Water'],
          baseStats: { hp: 80, atk: 60, def: 80, spa: 130, spd: 80, spe: 80 },
          moves: [ MV('waterfall', 'Water', 80, 'physical'),
                   MV('hydro-pump-clone', 'Water', 80, 'special') ],
        }) === 'hydro-pump-clone',
      },
      {
        // A drawback move (Giga Impact, same category) is avoided even though its
        // raw BP is highest — Body Slam wins on penalized expected output.
        name: 'avoids a drawback move when a clean STAB exists',
        run: () => pickName({
          types: ['Normal'],
          baseStats: { hp: 80, atk: 120, def: 80, spa: 80, spd: 80, spe: 80 },
          moves: [ MV('giga-impact', 'Normal', 150, 'physical'),
                   MV('body-slam', 'Normal', 85, 'physical') ],
        }) === 'body-slam',
      },
      {
        // Category follows the higher attacking stat as a HARD preference: special
        // Farigiraf (SpA 110 > Atk 90) must take special STAB Psychic, not the
        // higher-BP physical STAB Double-Edge (issue #68 pt 3).
        name: 'special attacker skips a higher-BP physical STAB (Farigiraf case)',
        run: () => pickName({
          types: ['Normal', 'Psychic'],
          baseStats: { hp: 120, atk: 90, def: 70, spa: 110, spd: 70, spe: 60 },
          moves: [ MV('double-edge', 'Normal', 120, 'physical'),
                   MV('psychic', 'Psychic', 90, 'special') ],
        }) === 'psychic',
      },
      {
        // Low accuracy lowers expected output: a reliable 90-BP STAB beats a
        // shaky 70%-accurate 120-BP STAB (120*0.7=84 < 90).
        name: 'discounts low-accuracy moves by hit chance',
        run: () => pickName({
          types: ['Ground'],
          baseStats: { hp: 80, atk: 120, def: 80, spa: 80, spd: 80, spe: 80 },
          moves: [ MV('precipice-blades-clone', 'Ground', 120, 'physical', 70),
                   MV('high-horsepower', 'Ground', 90, 'physical', 100) ],
        }) === 'high-horsepower',
      },
      {
        // Signature attacks are FORCED: thunderous-kick wins over a higher-BP
        // generic STAB move of the same category.
        name: 'forces a signature attack over a stronger generic',
        run: () => pickName({
          types: ['Fighting'],
          baseStats: { hp: 100, atk: 130, def: 80, spa: 60, spd: 80, spe: 90 },
          moves: [ MV('thunderous-kick', 'Fighting', 90, 'physical'),
                   MV('brick-break', 'Fighting', 110, 'physical') ],
        }) === 'thunderous-kick',
      },
      {
        // A SPREAD signature (Glacial Lance) is forced even though spread moves are
        // normally excluded, and despite a stronger single-target STAB alternative.
        name: 'forces a spread signature over the no-spread rule',
        run: () => pickName({
          types: ['Ice', 'Psychic'],
          baseStats: { hp: 100, atk: 165, def: 150, spa: 85, spd: 130, spe: 50 },
          moves: [ MV('glacial-lance', 'Ice', 120, 'physical', null, 'all-opponents'),
                   MV('high-horsepower', 'Ground', 95, 'physical') ],
        }) === 'glacial-lance',
      },
      {
        // Signature override also beats the category preference: a special-leaning
        // attacker (SpA 110 > Atk 81) still takes its physical signature instead of
        // the preferred-category special STAB.
        name: 'forces a signature even against the preferred category',
        run: () => pickName({
          types: ['Grass', 'Dark'],
          baseStats: { hp: 76, atk: 81, def: 70, spa: 110, spd: 70, spe: 123 },
          moves: [ MV('flower-trick', 'Grass', 70, 'physical'),
                   MV('dark-pulse', 'Dark', 80, 'special') ],
        }) === 'flower-trick',
      },
      {
        // Multiple signatures present -> highest expected-output score wins.
        name: 'breaks multiple signatures by score',
        run: () => pickName({
          types: ['Water'],
          baseStats: { hp: 100, atk: 130, def: 100, spa: 80, spd: 100, spe: 100 },
          moves: [ MV('fishious-rend', 'Water', 85, 'physical'),
                   MV('bolt-beak', 'Electric', 85, 'physical', 60) ],
        }) === 'fishious-rend', // both 85 BP signatures; bolt-beak's 60% acc loses
      },
      {
        // Issue #71: a new roster signature (Gigaton Hammer) is force-picked over a
        // higher-BP generic STAB of the same category.
        name: 'forces a newly-added roster signature (Tinkaton case)',
        run: () => pickName({
          types: ['Fairy', 'Steel'],
          baseStats: { hp: 85, atk: 75, def: 77, spa: 70, spd: 105, spe: 94 },
          moves: [ MV('gigaton-hammer', 'Steel', 160, 'physical'),
                   MV('play-rough', 'Fairy', 90, 'physical', 90) ],
        }) === 'gigaton-hammer',
      },
      {
        // Issue #71: a signature that is ALSO a drawback move (recharge Roar of Time)
        // is NOT force-picked — it falls through to the normal tiered pick, so a
        // clean STAB wins despite the signature's higher raw BP.
        name: 'does not force a drawback signature (Roar of Time exemption)',
        run: () => pickName({
          types: ['Dragon'],
          baseStats: { hp: 100, atk: 120, def: 120, spa: 150, spd: 100, spe: 90 },
          moves: [ MV('roar-of-time', 'Dragon', 150, 'special'),
                   MV('dragon-pulse', 'Dragon', 85, 'special') ],
        }) === 'dragon-pulse',
      },
      {
        // Foul Play scales off the TARGET's Attack, so it's a misleading default
        // for a strong physical attacker — Tyranitar should take Crunch even though
        // Foul Play's raw BP is higher.
        name: 'deprioritizes off-stat moves like Foul Play (Tyranitar case)',
        run: () => pickName({
          types: ['Rock', 'Dark'],
          baseStats: { hp: 100, atk: 134, def: 110, spa: 95, spd: 100, spe: 61 },
          moves: [ MV('foul-play', 'Dark', 95, 'physical'),
                   MV('crunch', 'Dark', 80, 'physical') ],
        }) === 'crunch',
      },
      {
        // Self-KO moves (Self-Destruct) are never the default even though their
        // raw BP dwarfs a clean STAB move — Snorlax should take Body Slam.
        name: 'never defaults to a self-KO move (Snorlax case)',
        run: () => pickName({
          types: ['Normal'],
          baseStats: { hp: 160, atk: 110, def: 65, spa: 65, spd: 110, spe: 30 },
          moves: [ MV('self-destruct', 'Normal', 200, 'physical'),
                   MV('explosion', 'Normal', 250, 'physical'),
                   MV('body-slam', 'Normal', 85, 'physical') ],
        }) === 'body-slam',
      },
      {
        // With only self-KO + status moves there's nothing to default to.
        name: 'returns null when only self-KO/status moves are damaging',
        run: () => pickDefaultMove({
          types: ['Normal'],
          baseStats: { hp: 160, atk: 110, def: 65, spa: 65, spd: 110, spe: 30 },
          moves: [ MV('explosion', 'Normal', 250, 'physical'), MV('yawn', 'Normal', 0, 'status') ],
        }) === null,
      },
      {
        // Spread moves (Earthquake, target all-other-pokemon) are skipped — their
        // 0.75x/targeting logic makes them a poor neutral default. Garchomp-like
        // attacker takes the single-target STAB instead.
        name: 'never defaults to a spread move',
        run: () => pickName({
          types: ['Dragon', 'Ground'],
          baseStats: { hp: 108, atk: 130, def: 95, spa: 80, spd: 85, spe: 102 },
          moves: [ MV('earthquake', 'Ground', 100, 'physical', 100, 'all-other-pokemon'),
                   MV('dragon-claw', 'Dragon', 80, 'physical') ],
        }) === 'dragon-claw',
      },
      {
        // Lock-in moves (Outrage) are deprioritized: Garchomp prefers a clean
        // single-target STAB even though Outrage's raw BP is higher.
        name: 'deprioritizes a lock-in move (Garchomp / Outrage)',
        run: () => pickName({
          types: ['Dragon', 'Ground'],
          baseStats: { hp: 108, atk: 130, def: 95, spa: 80, spd: 85, spe: 102 },
          moves: [ MV('outrage', 'Dragon', 120, 'physical'),
                   MV('high-horsepower', 'Ground', 95, 'physical') ],
        }) === 'high-horsepower',
      },
      {
        name: 'returns null when there are no damaging moves',
        run: () => pickDefaultMove({
          types: ['Psychic'],
          baseStats: { hp: 80, atk: 80, def: 80, spa: 80, spd: 80, spe: 80 },
          moves: [ MV('calm-mind', 'Psychic', 0, 'status'), MV('protect', 'Normal', 0, 'status') ],
        }) === null,
      },
      {
        // No STAB available: falls back to the best non-STAB damaging move.
        name: 'falls back to best non-STAB move when no STAB exists',
        run: () => pickName({
          types: ['Bug'],
          baseStats: { hp: 80, atk: 120, def: 80, spa: 80, spd: 80, spe: 80 },
          moves: [ MV('rock-slide', 'Rock', 75, 'physical'),
                   MV('earthquake', 'Ground', 100, 'physical') ],
        }) === 'earthquake',
      },
    ];

    let dmFail = 0;
    for (const c of DM_CASES) {
      let ok = false;
      let err = null;
      try { ok = !!c.run(); } catch (e) { err = e; }
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = ok
        ? `<div class="name">✓ [defaultmove] ${c.name}</div>`
        : `<div class="name">✗ [defaultmove] ${c.name}</div><div class="detail">${err ? err.message : 'assertion failed'}</div>`;
      results.appendChild(div);
      if (!ok) dmFail++;
    }

    // Keep the overall summary honest if a default-move test regressed.
    recordSuite('defaultmove', { pass: DM_CASES.length - dmFail, fail: dmFail });
  </script>

  <!-- Smart default nature + SP spread (pickAttackerSpread / pickDefenderSpread) -->
  <script type="module">
    import { pickAttackerSpread, pickDefenderSpread } from './src/engine/default-spread.js';

    const results = document.getElementById('results');
    // Base-stat factory; Spe defaults to a fast 100 (Spe investment) but slow
    // cases pass a value < 60 to exercise the HP-instead-of-Speed branch.
    const BS = (atk, spa, def, spd, spe = 100) => ({ hp: 100, atk, def, spa, spd, spe });

    const DS_CASES = [
      {
        // A physical attacker (Atk > SpA) gets the +atk / Atk+Spe spread.
        name: 'attacker: high-Atk mon defaults to a physical +atk spread',
        run: () => {
          const r = pickAttackerSpread(BS(135, 60, 120, 85));
          return r.nature === '+atk' && r.sps.atk === 32 && r.sps.spa === 0 && r.sps.spe === 32
            && r.sps.hp === 0;
        },
      },
      {
        // A slow mon (base Spe < 60) banks the second 32 into HP instead of Spe.
        name: 'attacker: slow mon (Spe < 60) invests HP instead of Speed',
        run: () => {
          const r = pickAttackerSpread(BS(135, 60, 120, 85, 50));
          return r.nature === '+atk' && r.sps.atk === 32 && r.sps.hp === 32 && r.sps.spe === 0;
        },
      },
      {
        // Base Spe of exactly 60 is fast enough — still Speed, not HP.
        name: 'attacker: base Spe of 60 still invests Speed',
        run: () => {
          const r = pickAttackerSpread(BS(135, 60, 120, 85, 60));
          return r.sps.spe === 32 && r.sps.hp === 0;
        },
      },
      {
        // A special attacker (SpA > Atk) gets the +spa / SpA+Spe spread.
        name: 'attacker: high-SpA mon defaults to a special +spa spread',
        run: () => {
          const r = pickAttackerSpread(BS(55, 135, 55, 135));
          return r.nature === '+spa' && r.sps.spa === 32 && r.sps.atk === 0 && r.sps.spe === 32;
        },
      },
      {
        // Equal attacking stats tie-break to physical (matches pickDefaultMove).
        name: 'attacker: equal Atk/SpA ties to physical',
        run: () => pickAttackerSpread(BS(100, 100, 80, 80)).nature === '+atk',
      },
      {
        // Defenders default to an attacker spread, not bulk: no HP/Def/SpD SP.
        // A high-Atk mon gets the physical +atk offense-leaning spread.
        name: 'defender: high-Atk mon defaults to a no-bulk physical spread',
        run: () => {
          const r = pickDefenderSpread(BS(135, 60, 120, 85));
          return r.nature === '+atk' && r.sps.hp === 0 && r.sps.def === 0 && r.sps.spd === 0
            && r.sps.atk === 32 && r.sps.spe === 32;
        },
      },
      {
        // A high-SpA mon gets the special +spa offense-leaning spread, still no bulk.
        name: 'defender: high-SpA mon defaults to a no-bulk special spread',
        run: () => {
          const r = pickDefenderSpread(BS(55, 135, 55, 135));
          return r.nature === '+spa' && r.sps.hp === 0 && r.sps.def === 0 && r.sps.spd === 0
            && r.sps.spa === 32 && r.sps.spe === 32;
        },
      },
      {
        // Never invests Def/SpD SP regardless of how bulky the base stats are.
        name: 'defender: bulky base stats still get zero Def/SpD SP',
        run: () => {
          const r = pickDefenderSpread(BS(60, 60, 130, 130));
          return r.sps.def === 0 && r.sps.spd === 0;
        },
      },
      {
        // A slow defender inherits the attacker HP split: HP instead of Speed,
        // still with no Def/SpD investment.
        name: 'defender: slow mon (Spe < 60) invests HP instead of Speed',
        run: () => {
          const r = pickDefenderSpread(BS(135, 60, 120, 85, 45));
          return r.sps.hp === 32 && r.sps.spe === 0 && r.sps.def === 0 && r.sps.spd === 0;
        },
      },
    ];

    let dsFail = 0;
    for (const c of DS_CASES) {
      let ok = false;
      let err = null;
      try { ok = !!c.run(); } catch (e) { err = e; }
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = ok
        ? `<div class="name">✓ [defaultspread] ${c.name}</div>`
        : `<div class="name">✗ [defaultspread] ${c.name}</div><div class="detail">${err ? err.message : 'assertion failed'}</div>`;
      results.appendChild(div);
      if (!ok) dsFail++;
    }

    recordSuite('defaultspread', { pass: DS_CASES.length - dsFail, fail: dsFail });
  </script>

  <!-- Expanded ability engine: type-changers, immunities, conditional boosts -->
  <script type="module">
    import { calculateDamageRolls, resolveEffectiveMove } from './src/engine/damage.js';

    const results = document.getElementById('results');

    const MON = (o = {}) => ({
      baseStats: { hp: 100, atk: 100, def: 100, spa: 100, spd: 100, spe: 100 },
      sps:       { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 },
      ivs:       { hp: 31, atk: 31, def: 31, spa: 31, spd: 31, spe: 31 },
      boosts:    { atk: 0, spa: 0, def: 0, spd: 0, spe: 0 },
      nature: 'neutral', item: 'none', ability: 'none', types: ['Ghost'], status: null, ...o,
    });
    const NOMOD = { spread: false, weather: 'none', crit: false, terrain: 'none', aura: 'none', screens: false };
    // Top (max) roll for a matchup; ability effects are deterministic per roll so
    // the max is a faithful proxy for the multiplier.
    const top = (atk, def, move, mod = {}) =>
      calculateDamageRolls(atk, def, move, { ...NOMOD, ...mod }).slice(-1)[0];
    // Ratio of (defender or attacker with ability) vs the same matchup with none.
    const approx = (a, b, tol = 0.04) => Math.abs(a - b) <= tol;

    // Ghost-typed attacker vs Normal/typed defenders avoids accidental STAB so the
    // ability multiplier is isolated. Moves carry no STAB unless noted.
    const PHYS = (type, power = 100) => ({ apiName: 'x-phys', name: 'x', type, power, category: 'physical' });
    const SPEC = (type, power = 100) => ({ apiName: 'x-spec', name: 'x', type, power, category: 'special' });

    const ABE_CASES = [
      {
        name: 'tinted-lens doubles not-very-effective damage',
        run: () => {
          const move = SPEC('Fire'); // Fire vs Water = 0.5x
          const def = MON({ types: ['Water'] });
          const r = top(MON({ ability: 'tinted-lens' }), def, move) / top(MON(), def, move);
          return approx(r, 2);
        },
      },
      {
        name: 'neuroforce boosts super-effective damage 1.25x',
        run: () => {
          const move = SPEC('Fire'); // Fire vs Grass = 2x
          const def = MON({ types: ['Grass'] });
          return approx(top(MON({ ability: 'neuroforce' }), def, move) / top(MON(), def, move), 1.25);
        },
      },
      {
        name: 'levitate / flash-fire / water-absorb / sap-sipper grant immunity (0)',
        run: () => {
          const g = top(MON(), MON({ ability: 'levitate' }), PHYS('Ground'));
          const f = top(MON(), MON({ ability: 'flash-fire' }), SPEC('Fire'));
          const w = top(MON(), MON({ ability: 'water-absorb' }), SPEC('Water'));
          const s = top(MON(), MON({ ability: 'sap-sipper' }), SPEC('Grass'));
          return g === 0 && f === 0 && w === 0 && s === 0;
        },
      },
      {
        name: 'fur-coat halves physical, leaves special alone',
        run: () => {
          const def = MON({ ability: 'fur-coat' });
          const phys = top(MON(), def, PHYS('Dark')) / top(MON(), MON(), PHYS('Dark'));
          const spec = top(MON(), def, SPEC('Dark')) / top(MON(), MON(), SPEC('Dark'));
          return approx(phys, 0.5) && approx(spec, 1);
        },
      },
      {
        name: "dragon's-maw / steely-spirit boost their type 1.5x",
        run: () => {
          const dm = top(MON({ ability: 'dragons-maw' }), MON(), SPEC('Dragon')) / top(MON(), MON(), SPEC('Dragon'));
          const ss = top(MON({ ability: 'steely-spirit' }), MON(), PHYS('Steel')) / top(MON(), MON(), PHYS('Steel'));
          return approx(dm, 1.5) && approx(ss, 1.5);
        },
      },
      {
        name: 'water-bubble: 2x Water dealt (attacker), 0.5x Fire taken (defender)',
        run: () => {
          const off = top(MON({ ability: 'water-bubble' }), MON(), SPEC('Water')) / top(MON(), MON(), SPEC('Water'));
          const def = top(MON(), MON({ ability: 'water-bubble' }), SPEC('Fire')) / top(MON(), MON(), SPEC('Fire'));
          return approx(off, 2) && approx(def, 0.5);
        },
      },
      {
        name: 'sand-force boosts Ground 1.3x only in a sandstorm',
        run: () => {
          const move = PHYS('Ground');
          const inSand = top(MON({ ability: 'sand-force' }), MON(), move, { weather: 'sandstorm' })
            / top(MON(), MON(), move, { weather: 'sandstorm' });
          const noSand = top(MON({ ability: 'sand-force' }), MON(), move) / top(MON(), MON(), move);
          return approx(inSand, 1.3) && approx(noSand, 1);
        },
      },
      {
        name: 'aerilate converts a Normal move to Flying + flags the 1.2x boost',
        run: () => {
          const eff = resolveEffectiveMove({ ability: 'aerilate' }, PHYS('Normal'), NOMOD);
          return eff.type === 'Flying' && eff._ateBoosted === true;
        },
      },
      {
        name: 'pixilate boost is 1.2x (type isolated via neutral matchup)',
        run: () => {
          // Ghost attacker (no STAB), Steel defender: Normal=1x, Fairy=1x vs Steel,
          // so only the 1.2x -ate boost differs.
          const def = MON({ types: ['Steel'] });
          return approx(top(MON({ ability: 'pixilate' }), def, PHYS('Normal')) / top(MON(), def, PHYS('Normal')), 1.2);
        },
      },
      {
        name: 'flare-boost: 1.5x special only while burned',
        run: () => {
          const burned = top(MON({ ability: 'flare-boost', status: 'burned' }), MON(), SPEC('Dark'))
            / top(MON({ status: 'burned' }), MON(), SPEC('Dark'));
          const healthy = top(MON({ ability: 'flare-boost' }), MON(), SPEC('Dark')) / top(MON(), MON(), SPEC('Dark'));
          return approx(burned, 1.5) && approx(healthy, 1);
        },
      },
      {
        name: 'wonder-guard: neutral/NVE hits do 0, super-effective lands',
        run: () => {
          const def = MON({ ability: 'wonder-guard', types: ['Grass'] });
          const neutral = top(MON(), def, SPEC('Water')); // Water vs Grass = 0.5x -> blocked
          const superEff = top(MON(), def, SPEC('Fire'));  // Fire vs Grass = 2x -> lands
          return neutral === 0 && superEff > 0;
        },
      },
      {
        name: 'gorilla-tactics / hustle ~1.5x Atk, pure-power 2x Atk (physical)',
        run: () => {
          const base = top(MON(), MON(), PHYS('Dark'));
          const gt = top(MON({ ability: 'gorilla-tactics' }), MON(), PHYS('Dark')) / base;
          const hu = top(MON({ ability: 'hustle' }), MON(), PHYS('Dark')) / base;
          const pp = top(MON({ ability: 'pure-power' }), MON(), PHYS('Dark')) / base;
          return approx(gt, 1.5, 0.05) && approx(hu, 1.5, 0.05) && approx(pp, 2, 0.05);
        },
      },
      {
        name: 'punk-rock boosts a sound move (Boomburst) 1.3x dealt',
        run: () => {
          const move = { apiName: 'boomburst', name: 'Boomburst', type: 'Normal', power: 140, category: 'special' };
          // Ghost attacker, Steel defender keeps Normal at 1x with no STAB.
          const def = MON({ types: ['Steel'] });
          return approx(top(MON({ ability: 'punk-rock' }), def, move) / top(MON(), def, move), 1.3);
        },
      },
      {
        name: 'analytic: 1.3x when moving last (slower), 1x when faster',
        run: () => {
          const slow = MON({ ability: 'analytic', baseStats: { hp: 100, atk: 100, def: 100, spa: 100, spd: 100, spe: 50 } });
          const slowNone = MON({ baseStats: { hp: 100, atk: 100, def: 100, spa: 100, spd: 100, spe: 50 } });
          const fastDef = MON({ baseStats: { hp: 100, atk: 100, def: 100, spa: 100, spd: 100, spe: 120 } });
          const last = top(slow, fastDef, SPEC('Dark')) / top(slowNone, fastDef, SPEC('Dark'));
          // Explicit movesFirst override: when the user moves first, no boost.
          const first = top(MON({ ability: 'analytic' }), MON(), SPEC('Dark'), { movesFirst: true })
            / top(MON(), MON(), SPEC('Dark'), { movesFirst: true });
          return approx(last, 1.3) && approx(first, 1);
        },
      },
      {
        name: 'solar-power: 1.5x special in sun only',
        run: () => {
          const inSun = top(MON({ ability: 'solar-power' }), MON(), SPEC('Dark'), { weather: 'sun' })
            / top(MON(), MON(), SPEC('Dark'), { weather: 'sun' });
          const noSun = top(MON({ ability: 'solar-power' }), MON(), SPEC('Dark')) / top(MON(), MON(), SPEC('Dark'));
          // Physical moves are unaffected even in sun.
          const phys = top(MON({ ability: 'solar-power' }), MON(), PHYS('Dark'), { weather: 'sun' })
            / top(MON(), MON(), PHYS('Dark'), { weather: 'sun' });
          return approx(inSun, 1.5) && approx(noSun, 1) && approx(phys, 1);
        },
      },
      {
        name: 'reckless boosts a recoil move (Brave Bird) 1.2x',
        run: () => {
          const move = { apiName: 'brave-bird', name: 'Brave Bird', type: 'Flying', power: 120, category: 'physical' };
          return approx(top(MON({ ability: 'reckless' }), MON(), move) / top(MON(), MON(), move), 1.2);
        },
      },
      {
        name: 'soundproof is immune to sound moves (0)',
        run: () => {
          const move = { apiName: 'boomburst', name: 'Boomburst', type: 'Normal', power: 140, category: 'special' };
          return top(MON(), MON({ ability: 'soundproof' }), move) === 0;
        },
      },
      {
        name: 'sheer-force boosts a secondary-effect move (Scald) 1.3x, plain move unaffected',
        run: () => {
          const scald = { apiName: 'scald', name: 'Scald', type: 'Water', power: 80, category: 'special' };
          const plain = { apiName: 'surf', name: 'Surf', type: 'Water', power: 90, category: 'special' };
          const boosted = top(MON({ ability: 'sheer-force' }), MON(), scald) / top(MON(), MON(), scald);
          const same = top(MON({ ability: 'sheer-force' }), MON(), plain) / top(MON(), MON(), plain);
          return approx(boosted, 1.3) && approx(same, 1);
        },
      },
      {
        name: 'pinch: Overgrow 1.5x Grass only when active; Defeatist 0.5x when active',
        run: () => {
          const grass = SPEC('Grass');
          const og = top(MON({ ability: 'overgrow' }), MON(), grass, { pinchActive: true }) / top(MON(), MON(), grass);
          const ogOff = top(MON({ ability: 'overgrow' }), MON(), grass) / top(MON(), MON(), grass);
          const df = top(MON({ ability: 'defeatist' }), MON(), SPEC('Dark'), { pinchActive: true }) / top(MON(), MON(), SPEC('Dark'));
          return approx(og, 1.5) && approx(ogOff, 1) && approx(df, 0.5);
        },
      },
      {
        name: 'protosynthesis: 1.3x SpA in sun / via Booster; off otherwise; Speed-highest does nothing',
        run: () => {
          const spaBest = (o = {}) => MON({ baseStats: { hp: 100, atk: 80, def: 80, spa: 150, spd: 80, spe: 80 }, ...o });
          const base = top(spaBest(), MON(), SPEC('Dark'));
          const sun = top(spaBest({ ability: 'protosynthesis' }), MON(), SPEC('Dark'), { weather: 'sun' })
            / top(spaBest(), MON(), SPEC('Dark'), { weather: 'sun' });
          const booster = top(spaBest({ ability: 'protosynthesis' }), MON(), SPEC('Dark'), { boosterActive: true }) / base;
          const off = top(spaBest({ ability: 'protosynthesis' }), MON(), SPEC('Dark')) / base;
          // Speed is the highest stat -> no offensive boost even when active.
          const speBest = MON({ ability: 'protosynthesis', baseStats: { hp: 100, atk: 80, def: 80, spa: 150, spd: 80, spe: 200 } });
          const speBestNone = MON({ baseStats: { hp: 100, atk: 80, def: 80, spa: 150, spd: 80, spe: 200 } });
          const speedHighest = top(speBest, MON(), SPEC('Dark'), { boosterActive: true }) / top(speBestNone, MON(), SPEC('Dark'));
          return approx(sun, 1.3, 0.05) && approx(booster, 1.3, 0.05) && approx(off, 1) && approx(speedHighest, 1);
        },
      },
      {
        name: 'quark-drive: 1.3x in Electric Terrain; protosynthesis defender raises its bulk',
        run: () => {
          const spaBest = (o = {}) => MON({ baseStats: { hp: 100, atk: 80, def: 80, spa: 150, spd: 80, spe: 80 }, ...o });
          const quark = top(spaBest({ ability: 'quark-drive' }), MON(), SPEC('Dark'), { terrain: 'electric' })
            / top(spaBest(), MON(), SPEC('Dark'), { terrain: 'electric' });
          // Defender with SpD highest + Protosynthesis in sun takes ~1/1.3 damage.
          const spdBest = (o = {}) => MON({ baseStats: { hp: 100, atk: 80, def: 80, spa: 80, spd: 150, spe: 80 }, ...o });
          const defended = top(MON(), spdBest({ ability: 'protosynthesis' }), SPEC('Dark'), { weather: 'sun' })
            / top(MON(), spdBest(), SPEC('Dark'), { weather: 'sun' });
          return approx(quark, 1.3, 0.05) && approx(defended, 1 / 1.3, 0.05);
        },
      },
      {
        name: 'fairy-aura / dark-aura abilities apply 1.33x in-engine (no field toggle)',
        run: () => {
          // Ghost attacker (no STAB); neutral defenders so only the aura differs.
          const fairy = top(MON({ ability: 'fairy-aura' }), MON({ types: ['Fire'] }), SPEC('Fairy'))
            / top(MON(), MON({ types: ['Fire'] }), SPEC('Fairy'));
          const dark = top(MON({ ability: 'dark-aura' }), MON({ types: ['Normal'] }), SPEC('Dark'))
            / top(MON(), MON({ types: ['Normal'] }), SPEC('Dark'));
          // A Fairy-Aura user's non-Fairy move is unaffected.
          const offType = top(MON({ ability: 'fairy-aura' }), MON({ types: ['Normal'] }), SPEC('Dark'))
            / top(MON(), MON({ types: ['Normal'] }), SPEC('Dark'));
          return approx(fairy, 1.33) && approx(dark, 1.33) && approx(offType, 1);
        },
      },
    ];

    let abeFail = 0;
    for (const c of ABE_CASES) {
      let ok = false;
      let err = null;
      try { ok = !!c.run(); } catch (e) { err = e; }
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = ok
        ? `<div class="name">✓ [abilityeng] ${c.name}</div>`
        : `<div class="name">✗ [abilityeng] ${c.name}</div><div class="detail">${err ? err.message : 'assertion failed'}</div>`;
      results.appendChild(div);
      if (!ok) abeFail++;
    }

    // Keep the overall summary honest if an ability-engine test regressed.
    recordSuite('abilityeng', { pass: ABE_CASES.length - abeFail, fail: abeFail });
  </script>
