<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Champions Spreads - Engine Tests</title>
  <style>
    body { font-family: ui-monospace, monospace; background: #0f172a; color: #e2e8f0; margin: 0; padding: 24px; }
    h1 { margin: 0 0 16px; font-size: 18px; }
    .summary { padding: 8px 12px; border-radius: 6px; margin-bottom: 16px; font-weight: bold; }
    .summary.pass { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .summary.fail { background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
    .case { border-left: 4px solid #334155; padding: 8px 12px; margin: 6px 0; background: #1e293b; border-radius: 0 6px 6px 0; }
    .case.pass { border-color: #16a34a; }
    .case.fail { border-color: #dc2626; }
    .case.snap { border-color: #ca8a04; }
    .name { font-weight: bold; }
    .detail { color: #94a3b8; font-size: 13px; margin-top: 4px; }
    .actual { color: #fbbf24; }
    .expected { color: #94a3b8; }
    code { background: #0f172a; padding: 1px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Damage Engine — Golden Case Tests</h1>
  <div id="summary" class="summary">Running…</div>
  <div id="results"></div>

  <script type="module">
    import { calculateDamageRolls } from './src/engine/damage.js';

    // Synthetic test mons with round base stats so the math is traceable.
    const NORMAL_MON = (overrides = {}) => ({
      baseStats: { hp: 100, atk: 100, def: 100, spa: 100, spd: 100, spe: 100 },
      sps:       { hp: 0,   atk: 0,   def: 0,   spa: 0,   spd: 0,   spe: 0 },
      ivs:       { hp: 31,  atk: 31,  def: 31,  spa: 31,  spd: 31,  spe: 31 },
      boosts:    { atk: 0, spa: 0, def: 0, spd: 0, spe: 0 },
      nature: 'neutral',
      item: 'none',
      ability: 'none',
      types: ['Normal'],
      ...overrides,
    });

    const TACKLE   = { apiName: 'tackle',   type: 'Normal',   power: 80, category: 'physical' };
    const FAKE_OUT = { apiName: 'fake-out', type: 'Normal',   power: 40, category: 'physical' };
    const CRUNCH   = { apiName: 'crunch',   type: 'Dark',     power: 80, category: 'physical' };
    const EMBER    = { apiName: 'ember',    type: 'Fire',     power: 80, category: 'physical' };
    const WATER_HIT = { apiName: 'water-hit', type: 'Water', power: 80, category: 'physical' };
    const ROCK_SLIDE = { apiName: 'rock-slide', type: 'Rock', power: 80, category: 'physical' };
    const ICE_HIT  = { apiName: 'ice-hit',  type: 'Ice',      power: 80, category: 'physical' };
    const ELEC_HIT = { apiName: 'elec-hit', type: 'Electric', power: 80, category: 'physical' };
    const ACROBATICS = { apiName: 'acrobatics', type: 'Flying', power: 55, category: 'physical' };
    const KNOCK_OFF = { apiName: 'knock-off', type: 'Dark', power: 65, category: 'physical' };
    const FACADE = { apiName: 'facade', type: 'Normal', power: 70, category: 'physical' };
    const HEX = { apiName: 'hex', type: 'Ghost', power: 65, category: 'special' };
    const BOLT_BEAK = { apiName: 'bolt-beak', type: 'Electric', power: 85, category: 'physical' };
    const COLLISION_COURSE = { apiName: 'collision-course', type: 'Fighting', power: 100, category: 'physical' };
    const PAYBACK = { apiName: 'payback', type: 'Dark', power: 50, category: 'physical' };
    const BODY_PRESS = { apiName: 'body-press', type: 'Fighting', power: 80, category: 'physical' };
    const FOUL_PLAY = { apiName: 'foul-play', type: 'Dark', power: 95, category: 'physical' };
    const PSYSHOCK = { apiName: 'psyshock', type: 'Psychic', power: 80, category: 'special' };
    const PHOTON_GEYSER = { apiName: 'photon-geyser', type: 'Psychic', power: 100, category: 'special' };
    const SPEC_PSY = { apiName: 'special-psychic', type: 'Psychic', power: 80, category: 'special' };
    const RETURN = { apiName: 'return', type: 'Normal', power: 0, category: 'physical' };
    const ERUPTION = { apiName: 'eruption', type: 'Fire', power: 150, category: 'special' };
    const GYRO_BALL = { apiName: 'gyro-ball', type: 'Steel', power: 1, category: 'physical' };
    const ELECTRO_BALL = { apiName: 'electro-ball', type: 'Electric', power: 0, category: 'special' };

    // Attacker preset: +atk nature, 32 SP into atk, everything else 0.
    const ATTACKER = (overrides = {}) => NORMAL_MON({
      nature: '+atk',
      sps: { hp: 0, atk: 32, def: 0, spa: 0, spd: 0, spe: 0 },
      ...overrides,
    });
    const DEFENDER = (overrides = {}) => NORMAL_MON({
      sps: { hp: 32, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 },
      ...overrides,
    });

    // Expected min/max recorded from the engine's behavior at the time of writing.
    // If you intentionally change the formula, run the tests, then paste the new
    // numbers in. An unintentional change shows up as a red ✗.
    const CASES = [
      // -------- Baseline & type chart --------
      {
        name: 'baseline: +atk attacker, Normal STAB, no modifiers',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: {},
        expected: { min: 63, max: 75 },
      },
      {
        name: 'no STAB: Fighting attacker, Normal move',
        attacker: ATTACKER({ types: ['Fighting'] }),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: {},
        expected: { min: 42, max: 50 },
      },
      {
        name: 'super effective 2x: Fire move on Grass defender (no STAB)',
        attacker: ATTACKER(),
        defender: DEFENDER({ types: ['Grass'] }),
        move: { ...TACKLE, type: 'Fire' },
        modifiers: {},
        expected: { min: 84, max: 100 },
      },
      {
        name: 'type immunity: Normal move on Ghost defender = 0',
        attacker: ATTACKER(),
        defender: DEFENDER({ types: ['Ghost'] }),
        move: TACKLE,
        modifiers: {},
        expected: { min: 0, max: 0 },
      },
      {
        name: 'quad effective 4x: Ice on Grass/Flying dual-type (no STAB)',
        attacker: ATTACKER(),
        defender: DEFENDER({ types: ['Grass', 'Flying'] }),
        move: ICE_HIT,
        modifiers: {},
        expected: { min: 168, max: 200 },
      },
      {
        name: 'Adaptability STAB is 2.0x (not 1.5x)',
        attacker: ATTACKER({ ability: 'adaptability' }),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: {},
        expected: { min: 84, max: 100 },
      },

      // -------- Step-1 ability regression coverage --------
      {
        name: 'Tough Claws + contact move (regression)',
        attacker: ATTACKER({ ability: 'tough-claws' }),
        defender: DEFENDER(),
        move: FAKE_OUT,
        modifiers: {},
        expected: { min: 42, max: 50 },
      },
      {
        name: 'Huge Power (regression)',
        attacker: ATTACKER({ ability: 'huge-power' }),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: {},
        expected: { min: 126, max: 148 },
      },
      {
        name: 'Strong Jaw + biting move (regression)',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: CRUNCH,
        modifiers: {},
        expected: { min: 42, max: 50 },
      },
      {
        name: 'Strong Jaw + biting move with ability (regression)',
        attacker: ATTACKER({ ability: 'strong-jaw' }),
        defender: DEFENDER(),
        move: CRUNCH,
        modifiers: {},
        expected: { min: 63, max: 75 },
      },
      {
        name: 'Supreme Overlord 1.5x (regression)',
        attacker: ATTACKER({ ability: 'supreme-overlord' }),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: {},
        expected: { min: 94, max: 112 },
      },
      {
        name: 'Rocky Payload + Rock move (regression: previously dead)',
        attacker: ATTACKER({ ability: 'rocky-payload' }),
        defender: DEFENDER(),
        move: ROCK_SLIDE,
        modifiers: {},
        expected: { min: 63, max: 75 },
      },
      {
        name: 'Shadow Shield defender (regression: previously dead)',
        attacker: ATTACKER(),
        defender: DEFENDER({ ability: 'shadow-shield' }),
        move: TACKLE,
        modifiers: {},
        expected: { min: 31, max: 37 },
      },
      {
        name: 'Multiscale defender halves damage',
        attacker: ATTACKER(),
        defender: DEFENDER({ ability: 'multiscale' }),
        move: TACKLE,
        modifiers: {},
        expected: { min: 31, max: 37 },
      },
      {
        name: 'Ice Scales halves special damage (regression)',
        attacker: ATTACKER(),
        defender: DEFENDER({ ability: 'ice-scales' }),
        move: { ...TACKLE, category: 'special' },
        modifiers: {},
        expected: { min: 21, max: 24 },
      },

      // -------- Items --------
      {
        name: 'Choice Band 1.5x Atk',
        attacker: ATTACKER({ item: 'choice_band' }),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: {},
        expected: { min: 94, max: 112 },
      },
      {
        name: 'Life Orb 1.3x damage',
        attacker: ATTACKER({ item: 'life_orb' }),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: {},
        expected: { min: 81, max: 97 },
      },
      {
        name: 'Expert Belt 1.2x on super-effective only',
        attacker: ATTACKER({ item: 'expert_belt' }),
        defender: DEFENDER({ types: ['Grass'] }),
        move: { ...TACKLE, type: 'Fire' },
        modifiers: {},
        expected: { min: 100, max: 120 },
      },
      {
        name: 'Acrobatics doubles power with no held item',
        attacker: ATTACKER({ item: 'none' }),
        defender: DEFENDER(),
        move: ACROBATICS,
        modifiers: {},
        expected: { min: 58, max: 69 },
      },
      {
        name: 'Acrobatics keeps base power when holding an item',
        attacker: ATTACKER({ item: 'life_orb' }),
        defender: DEFENDER(),
        move: ACROBATICS,
        modifiers: {},
        expected: { min: 37, max: 45 },
      },

      // -------- Group A: conditional power multipliers --------
      {
        name: 'Knock Off 1.5x when target holds an item',
        attacker: ATTACKER(),
        defender: DEFENDER({ item: 'leftovers' }),
        move: KNOCK_OFF,
        modifiers: {},
        expected: { min: 51, max: 61 },
      },
      {
        name: 'Knock Off base power when target has no item',
        attacker: ATTACKER(),
        defender: DEFENDER({ item: 'none' }),
        move: KNOCK_OFF,
        modifiers: {},
        expected: { min: 34, max: 41 },
      },
      {
        name: 'Facade 2x when user is statused, and ignores the burn drop',
        attacker: ATTACKER({ status: 'burned' }),
        defender: DEFENDER(),
        move: FACADE,
        modifiers: {},
        expected: { min: 109, max: 130 },
      },
      {
        name: 'Facade base power with no status',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: FACADE,
        modifiers: {},
        expected: { min: 55, max: 66 },
      },
      {
        name: 'Hex 2x when target is statused',
        attacker: ATTACKER(),
        defender: DEFENDER({ types: ['Water'], status: 'poisoned' }),
        move: HEX,
        modifiers: {},
        expected: { min: 45, max: 53 },
      },
      {
        name: 'Hex base power when target has no status',
        attacker: ATTACKER(),
        defender: DEFENDER({ types: ['Water'] }),
        move: HEX,
        modifiers: {},
        expected: { min: 22, max: 27 },
      },
      {
        name: 'Bolt Beak 2x when moving first',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: BOLT_BEAK,
        modifiers: { movesFirst: true },
        expected: { min: 90, max: 106 },
      },
      {
        name: 'Bolt Beak base power at equal Speed (not moving first)',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: BOLT_BEAK,
        modifiers: {},
        expected: { min: 45, max: 54 },
      },
      {
        name: 'Bolt Beak 2x inferred from Speed when faster',
        attacker: ATTACKER({ boosts: { atk: 0, spa: 0, def: 0, spd: 0, spe: 2 } }),
        defender: DEFENDER(),
        move: BOLT_BEAK,
        modifiers: {},
        expected: { min: 90, max: 106 },
      },
      {
        name: 'Collision Course ~1.333x on a super-effective hit',
        attacker: ATTACKER(),
        defender: DEFENDER({ types: ['Normal'] }),
        move: COLLISION_COURSE,
        modifiers: {},
        expected: { min: 141, max: 167 },
      },
      {
        name: 'Collision Course no bonus on a neutral hit',
        attacker: ATTACKER(),
        defender: DEFENDER({ types: ['Water'] }),
        move: COLLISION_COURSE,
        modifiers: {},
        expected: { min: 53, max: 63 },
      },
      {
        name: 'Payback 2x inferred from Speed when slower',
        attacker: ATTACKER(),
        defender: DEFENDER({ boosts: { atk: 0, spa: 0, def: 0, spd: 0, spe: 2 } }),
        move: PAYBACK,
        modifiers: {},
        expected: { min: 53, max: 63 },
      },
      {
        name: 'Payback base power when faster',
        attacker: ATTACKER({ boosts: { atk: 0, spa: 0, def: 0, spd: 0, spe: 2 } }),
        defender: DEFENDER(),
        move: PAYBACK,
        modifiers: {},
        expected: { min: 27, max: 32 },
      },
      {
        name: 'Payback 2x via explicit move-last override',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: PAYBACK,
        modifiers: { movesFirst: false },
        expected: { min: 53, max: 63 },
      },

      {
        name: 'Eviolite defender 1.5x Def',
        attacker: ATTACKER(),
        defender: DEFENDER({ item: 'eviolite' }),
        move: TACKLE,
        modifiers: {},
        expected: { min: 42, max: 51 },
      },

      // -------- Group B: stat-swap moves --------
      {
        name: 'Body Press uses the user Defense as the offensive stat',
        attacker: ATTACKER(),
        defender: DEFENDER({ types: ['Water'] }),
        move: BODY_PRESS,
        modifiers: {},
        expected: { min: 31, max: 37 },
      },
      {
        name: 'Body Press scales with a Defense boost',
        attacker: ATTACKER({ boosts: { atk: 0, spa: 0, def: 2, spd: 0, spe: 0 } }),
        defender: DEFENDER({ types: ['Water'] }),
        move: BODY_PRESS,
        modifiers: {},
        expected: { min: 61, max: 72 },
      },
      {
        name: 'Foul Play uses the target Attack stat',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: FOUL_PLAY,
        modifiers: {},
        expected: { min: 36, max: 43 },
      },
      {
        name: 'Foul Play scales with the target Attack boost',
        attacker: ATTACKER(),
        defender: DEFENDER({ boosts: { atk: 2, spa: 0, def: 0, spd: 0, spe: 0 } }),
        move: FOUL_PLAY,
        modifiers: {},
        expected: { min: 72, max: 85 },
      },
      {
        name: 'Psyshock hits physical Def (ignores a SpD boost)',
        attacker: ATTACKER(),
        defender: DEFENDER({ boosts: { atk: 0, spa: 0, def: 0, spd: 2, spe: 0 } }),
        move: PSYSHOCK,
        modifiers: {},
        expected: { min: 28, max: 33 },
      },
      {
        name: 'Ordinary special move hits SpD (SpD boost applies)',
        attacker: ATTACKER(),
        defender: DEFENDER({ boosts: { atk: 0, spa: 0, def: 0, spd: 2, spe: 0 } }),
        move: SPEC_PSY,
        modifiers: {},
        expected: { min: 14, max: 17 },
      },
      {
        name: 'Photon Geyser uses Atk when higher (hits Def)',
        attacker: ATTACKER(),
        defender: DEFENDER({ boosts: { atk: 0, spa: 0, def: 2, spd: 0, spe: 0 } }),
        move: PHOTON_GEYSER,
        modifiers: {},
        expected: { min: 27, max: 32 },
      },
      {
        name: 'Photon Geyser uses SpA when higher (hits SpD)',
        attacker: ATTACKER({ nature: '+spa', sps: { hp: 0, atk: 0, def: 0, spa: 32, spd: 0, spe: 0 } }),
        defender: DEFENDER({ boosts: { atk: 0, spa: 0, def: 2, spd: 0, spe: 0 } }),
        move: PHOTON_GEYSER,
        modifiers: {},
        expected: { min: 53, max: 63 },
      },
      {
        name: 'Assault Vest boosts SpD against a special move',
        attacker: ATTACKER(),
        defender: DEFENDER({ item: 'assault_vest' }),
        move: SPEC_PSY,
        modifiers: {},
        expected: { min: 19, max: 23 },
      },
      {
        name: 'Assault Vest does not help against Psyshock (hits Def)',
        attacker: ATTACKER(),
        defender: DEFENDER({ item: 'assault_vest' }),
        move: PSYSHOCK,
        modifiers: {},
        expected: { min: 28, max: 33 },
      },

      // -------- Crit, weather, terrain, screens, friend guard --------
      {
        name: 'Crit 1.5x',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: { crit: true },
        expected: { min: 94, max: 112 },
      },
      {
        name: 'Sniper + crit = 2.25x',
        attacker: ATTACKER({ ability: 'sniper' }),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: { crit: true },
        expected: { min: 141, max: 168 },
      },
      {
        name: 'Sun boosts Fire moves 1.5x (Fire STAB attacker)',
        attacker: ATTACKER({ types: ['Fire'] }),
        defender: DEFENDER(),
        move: EMBER,
        modifiers: { weather: 'sun' },
        expected: { min: 94, max: 112 },
      },
      {
        name: 'Mega Sol boosts Fire moves 1.5x like sun (no weather)',
        attacker: ATTACKER({ ability: 'mega-sol' }),
        defender: DEFENDER(),
        move: EMBER,
        modifiers: {},
        expected: { min: 63, max: 75 },
      },
      {
        name: 'Fire move without Mega Sol or sun is unboosted',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: EMBER,
        modifiers: {},
        expected: { min: 42, max: 50 },
      },
      {
        name: 'Mega Sol weakens Water moves 0.5x like sun',
        attacker: ATTACKER({ ability: 'mega-sol' }),
        defender: DEFENDER(),
        move: WATER_HIT,
        modifiers: {},
        expected: { min: 21, max: 25 },
      },
      {
        name: 'Mega Sol overrides rain: Fire move still boosted',
        attacker: ATTACKER({ ability: 'mega-sol' }),
        defender: DEFENDER(),
        move: EMBER,
        modifiers: { weather: 'rain' },
        expected: { min: 63, max: 75 },
      },
      {
        name: 'Electric terrain boosts Electric move 1.3x (grounded attacker)',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: ELEC_HIT,
        modifiers: { terrain: 'electric' },
        expected: { min: 54, max: 65 },
      },
      {
        name: 'Friend Guard 0.75x',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: { friendGuard: true },
        expected: { min: 47, max: 56 },
      },
      {
        name: 'Screens 0.66x',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: { screens: true },
        expected: { min: 41, max: 49 },
      },
      {
        name: 'spread move modifier 0.75x',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: { spread: true },
        expected: { min: 47, max: 56 },
      },

      // -------- Burn and Helping Hand --------
      {
        name: 'Burned attacker: physical damage halved',
        attacker: ATTACKER({ status: 'burned' }),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: {},
        expected: { min: 31, max: 37 },
      },
      {
        name: 'Burned attacker: special damage NOT halved',
        attacker: ATTACKER({ status: 'burned' }),
        defender: DEFENDER(),
        move: { ...TACKLE, category: 'special' },
        modifiers: {},
        expected: { min: 42, max: 49 },
      },
      {
        name: 'Guts attacker ignores burn (no 0.5x halve)',
        attacker: ATTACKER({ status: 'burned', ability: 'guts' }),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: {},
        expected: { min: 94, max: 112 },
      },
      {
        name: 'Helping Hand 1.5x',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: TACKLE,
        modifiers: { helpingHand: true },
        expected: { min: 94, max: 112 },
      },

      // -------- Group C: variable base power --------
      {
        name: 'Return is a fixed 102 BP',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: RETURN,
        modifiers: {},
        expected: { min: 81, max: 96 },
      },
      {
        name: 'Eruption assumes full HP (150 BP)',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: ERUPTION,
        modifiers: {},
        expected: { min: 51, max: 61 },
      },
      {
        name: 'Gyro Ball at equal speed (26 BP)',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: GYRO_BALL,
        modifiers: {},
        expected: { min: 14, max: 17 },
      },
      {
        name: 'Gyro Ball scales up against a faster target',
        attacker: ATTACKER(),
        defender: DEFENDER({ boosts: { atk: 0, spa: 0, def: 0, spd: 0, spe: 2 } }),
        move: GYRO_BALL,
        modifiers: {},
        expected: { min: 28, max: 33 },
      },
      {
        name: 'Electro Ball at equal speed (60 BP)',
        attacker: ATTACKER(),
        defender: DEFENDER(),
        move: ELECTRO_BALL,
        modifiers: {},
        expected: { min: 21, max: 25 },
      },
      {
        name: 'Electro Ball scales up against a slower target',
        attacker: ATTACKER({ boosts: { atk: 0, spa: 0, def: 0, spd: 0, spe: 2 } }),
        defender: DEFENDER(),
        move: ELECTRO_BALL,
        modifiers: {},
        expected: { min: 28, max: 33 },
      },
    ];

    const results = document.getElementById('results');
    const summary = document.getElementById('summary');
    let pass = 0, fail = 0, snap = 0;

    for (const c of CASES) {
      const rolls = calculateDamageRolls(c.attacker, c.defender, c.move, c.modifiers);
      const actualMin = rolls[0];
      const actualMax = rolls[rolls.length - 1];

      const div = document.createElement('div');
      div.className = 'case';

      if (!c.expected) {
        snap++;
        div.classList.add('snap');
        div.innerHTML = `
          <div class="name">📸 ${c.name}</div>
          <div class="detail">No baseline. Snapshot: <code>expected: { min: ${actualMin}, max: ${actualMax} }</code></div>
        `;
      } else if (actualMin === c.expected.min && actualMax === c.expected.max) {
        pass++;
        div.classList.add('pass');
        div.innerHTML = `
          <div class="name">✓ ${c.name}</div>
          <div class="detail">min=${actualMin} max=${actualMax}</div>
        `;
      } else {
        fail++;
        div.classList.add('fail');
        div.innerHTML = `
          <div class="name">✗ ${c.name}</div>
          <div class="detail">
            <span class="expected">expected min=${c.expected.min} max=${c.expected.max}</span> ·
            <span class="actual">actual min=${actualMin} max=${actualMax}</span>
          </div>
        `;
      }
      results.appendChild(div);
    }

    summary.textContent = `${pass} passed · ${fail} failed · ${snap} snapshot${snap === 1 ? '' : 's'} (of ${CASES.length})`;
    summary.classList.add(fail === 0 ? 'pass' : 'fail');
  </script>

  <!-- Pokédex pure-logic tests (bst / sortDex / filterDex) -->
  <script type="module">
    import { bst, sortDex, filterDex, STAT_KEYS, isHiddenForm } from './src/data/dex.js';

    const results = document.getElementById('results');
    const summary = document.getElementById('summary');

    // Row factory: details=null means "not yet loaded".
    const stats = (hp, atk, def, spa, spd, spe) => ({ hp, atk, def, spa, spd, spe });
    const row = (name, baseStats, abilities) => ({
      apiName: name.toLowerCase(),
      name,
      details: baseStats ? { name, baseStats, abilities: (abilities || []).map(n => ({ name: n, apiName: n.toLowerCase() })) } : null,
    });

    const names = (rows) => rows.map(r => r.name);
    const eq = (a, b) => JSON.stringify(a) === JSON.stringify(b);

    const DEX_CASES = [
      {
        name: 'bst sums the six base stats',
        run: () => bst(stats(1, 2, 3, 4, 5, 6)) === 21 && STAT_KEYS.length === 6,
      },
      {
        name: 'sortDex by atk desc, then asc reverses order',
        run: () => {
          const rows = [
            row('Alpha', stats(100, 50, 100, 100, 100, 100)),
            row('Bravo', stats(100, 130, 100, 100, 100, 100)),
            row('Charlie', stats(100, 90, 100, 100, 100, 100)),
          ];
          const desc = names(sortDex(rows, 'atk', 'desc'));
          const asc = names(sortDex(rows, 'atk', 'asc'));
          return eq(desc, ['Bravo', 'Charlie', 'Alpha']) && eq(asc, ['Alpha', 'Charlie', 'Bravo']);
        },
      },
      {
        name: 'sortDex is stable on ties',
        run: () => {
          const rows = [
            row('First', stats(100, 80, 100, 100, 100, 100)),
            row('Second', stats(100, 80, 100, 100, 100, 100)),
            row('Third', stats(100, 80, 100, 100, 100, 100)),
          ];
          return eq(names(sortDex(rows, 'atk', 'desc')), ['First', 'Second', 'Third']);
        },
      },
      {
        name: 'sortDex sinks null-detail rows to the end (both directions)',
        run: () => {
          const rows = [
            row('Loaded', stats(100, 90, 100, 100, 100, 100)),
            row('Pending', null),
            row('Other', stats(100, 60, 100, 100, 100, 100)),
          ];
          const desc = names(sortDex(rows, 'atk', 'desc'));
          const asc = names(sortDex(rows, 'atk', 'asc'));
          return desc[desc.length - 1] === 'Pending' && asc[asc.length - 1] === 'Pending';
        },
      },
      {
        name: 'sortDex by bst uses the stat total',
        run: () => {
          const rows = [
            row('Low', stats(50, 50, 50, 50, 50, 50)),   // 300
            row('High', stats(100, 100, 100, 100, 100, 100)), // 600
          ];
          return eq(names(sortDex(rows, 'bst', 'desc')), ['High', 'Low']);
        },
      },
      {
        name: 'filterDex matches by name',
        run: () => {
          const rows = [row('Charizard', stats(78, 84, 78, 109, 85, 100), ['Blaze']), row('Garchomp', stats(108, 130, 95, 80, 85, 102), ['Rough Skin'])];
          return eq(names(filterDex(rows, 'char')), ['Charizard']);
        },
      },
      {
        name: 'filterDex matches by ability name',
        run: () => {
          const rows = [row('Gyarados', stats(95, 125, 79, 60, 100, 81), ['Intimidate']), row('Magikarp', stats(20, 10, 55, 15, 20, 80), ['Swift Swim'])];
          return eq(names(filterDex(rows, 'intimidate')), ['Gyarados']);
        },
      },
      {
        name: 'filterDex falls back to name-only when details absent',
        run: () => {
          const rows = [row('Pending', null), row('Other', null)];
          // ability query should match nothing (no details), name query still works
          return filterDex(rows, 'intimidate').length === 0 && eq(names(filterDex(rows, 'pend')), ['Pending']);
        },
      },
      {
        name: 'filterDex returns all rows for empty query',
        run: () => {
          const rows = [row('A', stats(1, 1, 1, 1, 1, 1)), row('B', null)];
          return filterDex(rows, '   ').length === 2;
        },
      },
      {
        name: 'isHiddenForm hides ride/gimmick/cosmetic forms',
        run: () => [
          'koraidon-sprinting-build', 'miraidon-aquatic-mode',
          'charizard-gmax', 'eternatus-eternamax', 'marowak-totem',
          'mimikyu-totem-disguised', 'pikachu-libre', 'pikachu-world-cap',
          'eevee-starter', 'mimikyu-busted', 'morpeko-hangry',
          'cramorant-gulping', 'tatsugiri-droopy', 'maushold-family-of-three',
          'minior-blue', 'minior-red',
        ].every(isHiddenForm),
      },
      {
        name: 'isHiddenForm keeps real forms and distinct species',
        run: () => [
          'charizard', 'charizard-mega-x', 'ninetales-alola', 'rotom-heat',
          'aegislash-blade', 'gourgeist-small', 'castform-sunny',
          'minior-red-meteor', 'mr-rime', 'mr-mime', 'iron-hands',
          'tapu-koko', 'nidoran-f',
        ].every(n => !isHiddenForm(n)),
      },
    ];

    let dexFail = 0;
    for (const c of DEX_CASES) {
      let ok = false;
      let err = null;
      try { ok = !!c.run(); } catch (e) { err = e; }
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = ok
        ? `<div class="name">✓ [dex] ${c.name}</div>`
        : `<div class="name">✗ [dex] ${c.name}</div><div class="detail">${err ? err.message : 'assertion failed'}</div>`;
      results.appendChild(div);
      if (!ok) dexFail++;
    }

    // Keep the overall summary honest if a dex test regressed.
    if (dexFail > 0) {
      summary.textContent = `${summary.textContent} · ${dexFail} dex failure${dexFail === 1 ? '' : 's'}`;
      summary.classList.remove('pass');
      summary.classList.add('fail');
    }
  </script>
