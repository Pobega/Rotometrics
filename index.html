<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotometrics - VGC Spread Optimizer</title>
  <!-- Favicon: Rotom (PokéAPI Gen-8 menu icon), served locally so it overrides
       the GitHub Pages domain-root /favicon.ico fallback. -->
  <link rel="icon" type="image/png" href="favicon.png">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Preact + htm via CDN importmap (zero-build, same philosophy as the Tailwind CDN).
       The calculator's Attacker card is rendered with these; the rest of the page
       is still vanilla during the page-by-page migration. -->
  <script type="importmap">
  {
    "imports": {
      "preact": "https://esm.sh/preact@10.25.4",
      "preact/hooks": "https://esm.sh/preact@10.25.4/hooks",
      "htm": "https://esm.sh/htm@3.1.1"
    }
  }
  </script>
  <style>
    /* Custom styling for neatness */
    .pokemon-card {
      transition: all 0.3s ease;
    }
    .pokemon-card:hover {
      transform: translateY(-2px);
    }
    /* Style native dropdown select options to respect night mode on all platforms */
    select option {
      background-color: #1e293b !important; /* bg-slate-800 */
      color: #f1f5f9 !important; /* text-slate-100 */
    }
    select option:hover {
      background-color: #334155 !important; /* bg-slate-700 */
    }
    /* Hide native number-input spinner arrows (Chrome/Safari + Firefox) */
    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    /* Rotom electric aura: a faint plasma pulse on the live damage HUD/overlay,
       cross-fading between Rotom's electric-blue charge and its orange plasma
       glow. The glow lives on two stacked pseudo-elements whose OPACITY animates
       (compositor-only) — animating box-shadow directly flickers when the host
       also has backdrop-blur, so we keep the host static and pulse a layer behind it. */
    .rotom-aura { position: relative; isolation: isolate; }
    .rotom-aura::before,
    .rotom-aura::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      z-index: -1;
      animation: rotom-aura 4s ease-in-out infinite;
    }
    .rotom-aura::before { box-shadow: 0 0 20px -3px rgba(56,189,248,0.55); }   /* electric blue */
    .rotom-aura::after  { box-shadow: 0 0 22px -3px rgba(251,146,60,0.50); animation-delay: -2s; } /* plasma orange */
    @keyframes rotom-aura { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .rotom-aura::before { animation: none; opacity: 0.8; }
      .rotom-aura::after  { animation: none; opacity: 0; }
    }
</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

  <!-- Compact Responsive Header -->
  <header class="bg-slate-800 border-b border-slate-700 py-3 px-4 sm:px-6 shadow-md">
    <div class="max-w-[1440px] mx-auto flex justify-between items-center gap-4">
      
      <!-- Logo / Title (Compact) -->
      <div class="flex items-center gap-2.5 min-w-0">
        <div class="flex items-center justify-center w-11 h-11 shrink-0">
          <img id="brand-rotom" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/479.gif" alt="Rotom" class="w-11 h-11 object-contain transition-[filter]">
        </div>
        <div class="min-w-0">
          <h1 class="text-sm sm:text-base font-black tracking-wider bg-gradient-to-r from-amber-400 via-orange-500 to-sky-400 bg-clip-text text-transparent uppercase truncate">
            Rotometrics
          </h1>
          <p id="brand-subtitle" class="text-[9px] text-slate-400 font-semibold tracking-wider uppercase truncate hidden sm:block">VGC Spread Optimizer</p>
        </div>
      </div>
      
      <!-- Header Controls on a Single Row -->
      <div class="flex items-center gap-2.5 shrink-0">
        <!-- View Toggle: Calculator | Pokédex -->
        <div class="flex items-center bg-slate-900 border border-slate-700 rounded-lg p-0.5 gap-0.5">
          <button id="nav-calculator" class="text-[9px] sm:text-[10px] font-extrabold uppercase tracking-wider py-1.5 px-2.5 rounded-md transition bg-amber-950/40 text-amber-400 shadow">
            <i class="fa-solid fa-meteor sm:hidden"></i><span class="hidden sm:inline">Calculator</span>
          </button>
          <button id="nav-pokedex" class="text-[9px] sm:text-[10px] font-extrabold uppercase tracking-wider py-1.5 px-2.5 rounded-md transition text-slate-400 hover:text-white">
            <i class="fa-solid fa-book sm:hidden"></i><span class="hidden sm:inline">Pokédex</span>
          </button>
          <button id="nav-attackdex" class="text-[9px] sm:text-[10px] font-extrabold uppercase tracking-wider py-1.5 px-2.5 rounded-md transition text-slate-400 hover:text-white">
            <i class="fa-solid fa-burst sm:hidden"></i><span class="hidden sm:inline">Attackdex</span>
          </button>
        </div>
        <!-- Format Selector (Dropdown select styled compactly) -->
        <div id="format-pill" class="flex items-center gap-1.5 bg-slate-900 border border-slate-700 rounded-lg px-2.5 py-1.5 text-[10px] font-bold text-slate-300 transition-colors">
          <span class="text-[9px] font-extrabold text-slate-500 uppercase tracking-wider hidden sm:inline">Regulation:</span>
          <!-- Options populated from the regulation registry by populateFormatSelector() in app.js. -->
          <select id="format-selector" class="bg-transparent font-bold focus:outline-none text-slate-200 cursor-pointer uppercase tracking-wider text-[9px] sm:text-[10px]"></select>
        </div>
        
        <!-- Load Matchup Button (Turned into a gorgeous compact icon button on mobile, text on desktop!) -->
        <button id="load-sample-btn" class="bg-amber-600 hover:bg-amber-500 border border-amber-500/30 text-white text-[10px] font-extrabold py-1.5 px-2.5 rounded-lg transition flex items-center gap-1.5 shadow" title="Load VGC Sample Matchup">
          <i class="fa-solid fa-wand-magic-sparkles"></i>
          <span class="hidden md:inline">Load Sample</span>
        </button>

        <!-- Export / Import the current matchup as shareable text -->
        <button id="export-import-btn" class="bg-cyan-700 hover:bg-cyan-600 border border-cyan-500/30 text-white text-[10px] font-extrabold py-1.5 px-2.5 rounded-lg transition flex items-center gap-1.5 shadow" title="Export or import a matchup as text">
          <i class="fa-solid fa-right-left"></i>
          <span class="hidden md:inline">Export / Import</span>
        </button>
      </div>
      
    </div>
  </header>

  <!-- Desktop damage HUD. A self-contained card above the calculator grid that
       sticks to the top of the viewport (floating, with a small gap) once you scroll
       past it. Visible on lg+ only. Kept outside #page-calculator so it can stay
       pinned across the whole scroll. -->
  <div id="results-hud" class="hidden lg:block sticky top-3 lg:top-4 z-40 mt-5 lg:mt-6">
    <!-- Preact ResultsHUD island (desktop variant) mounts here. -->
  </div><!-- #results-hud -->

  <!-- Main Layout Container (Spacious 1440p Expanded Width with Mobile bottom pad cushion!) -->
  <main id="page-calculator" class="max-w-[1440px] mx-auto p-5 lg:p-6 pb-28 lg:pb-6 grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-6">
    
    <!-- Mobile Navigation Tabs (Sticky Floating Bar visible only on mobile < lg!) -->
    <div class="lg:hidden col-span-1 sticky top-0 z-[100] flex border border-slate-700 bg-slate-950/95 backdrop-blur-md rounded-2xl p-1.5 gap-1.5 mb-3.5 shadow-lg">
      <button id="mob-tab-attacker" class="flex-1 text-center py-2.5 text-xs font-extrabold rounded-xl transition flex items-center justify-center gap-1 text-slate-400 hover:text-white">
        <i class="fa-solid fa-hand-fist"></i> Attacker
      </button>
      <button id="mob-tab-results" class="flex-1 text-center py-2.5 text-xs font-extrabold rounded-xl transition flex items-center justify-center gap-1 bg-amber-950/30 text-amber-400 border border-amber-900/30 shadow">
        <i class="fa-solid fa-meteor"></i> Battle & Calcs
      </button>
      <button id="mob-tab-defender" class="flex-1 text-center py-2.5 text-xs font-extrabold rounded-xl transition flex items-center justify-center gap-1 text-slate-400 hover:text-white">
        <i class="fa-solid fa-shield-halved"></i> Defender
      </button>
    </div>
    
    <!-- LEFT COLUMN: Attacker (4/12) (Visual Column Envelope Outline!) -->
    <section id="panel-attacker" class="hidden lg:flex lg:flex-col lg:col-span-4 gap-7 lg:gap-5 bg-slate-950/20 border border-slate-800/80 rounded-3xl p-5 lg:p-4">
      <!-- Preact AttackerCard island mounts here (src/ui-preact/AttackerCard.js).
           The section wrapper + #panel-attacker id stay so mobile tabbing still works. -->
    </section>

    <!-- CENTER COLUMN: Results & Controls (4/12) (Visual Column Envelope Outline!) -->
    <section id="panel-center" class="hidden lg:flex lg:flex-col lg:col-span-4 gap-7 lg:gap-5 bg-slate-950/20 border border-slate-800/80 rounded-3xl p-5 lg:p-4">
      <!-- Preact CenterPanel island mounts here (Modifiers + Move + Optimizer;
           src/ui-preact/OptimizerPanel.js -> CenterPanel). -->
    </section>

    <!-- RIGHT COLUMN: Defender (4/12) (Visual Column Envelope Outline!) -->
    <section id="panel-defender" class="hidden lg:flex lg:flex-col lg:col-span-4 gap-7 lg:gap-5 bg-slate-950/20 border border-slate-800/80 rounded-3xl p-5 lg:p-4">
      <!-- Preact DefenderCard island mounts here (src/ui-preact/DefenderCard.js). -->
    </section>

  </main>

  <!-- POKÉDEX PAGE (full-width species stats browser; hidden until toggled) -->
  <!-- Pokédex page: rendered by the Preact DexView island (src/ui-preact/DexView.js),
       mounted here by app.js. page-nav keeps toggling this container's visibility. -->
  <main id="page-pokedex" class="hidden max-w-[1440px] mx-auto p-5 lg:p-6 pb-28 lg:pb-6"></main>

  <!-- Attackdex: a move browser parallel to the Pokédex. Rendered by the Preact
       AttackdexView island (src/ui-preact/AttackdexView.js), mounted here by
       app.js. Hidden by default; toggled via #nav-attackdex through page-nav. -->
  <main id="page-attackdex" class="hidden max-w-[1440px] mx-auto p-5 lg:p-6 pb-28 lg:pb-6"></main>

  <!-- Premium Mobile Sticky Floating Damage Overlay (Visible ONLY on mobile < lg width!) -->
  <div id="mobile-floating-overlay" class="rotom-aura lg:hidden fixed bottom-0 left-0 right-0 z-[999] bg-slate-900/96 backdrop-blur-md border-t border-slate-700 px-5 py-3.5 flex flex-col gap-2.5 shadow-[0_-10px_35px_rgba(0,0,0,0.65)] transition-transform duration-300 text-left">
    <!-- Preact ResultsHUD island (mobile variant) mounts here. -->
  </div>
  <!-- Export / Import matchup modal (hidden until opened from the header) -->
  <div id="ei-modal" class="hidden fixed inset-0 z-[300] flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4">
    <div class="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-lg flex flex-col gap-3 p-5">
      <div class="flex items-center justify-between">
        <h3 class="text-sm font-extrabold text-cyan-400 flex items-center gap-2">
          <i class="fa-solid fa-right-left"></i> Export / Import Matchup
        </h3>
        <button id="ei-close-btn" class="text-slate-400 hover:text-white text-lg leading-none px-1" title="Close">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <p class="text-[11px] text-slate-400 leading-snug">
        Copy this text to share the matchup, or paste someone else's and hit Import to load it.
      </p>
      <textarea id="ei-textarea" spellcheck="false" rows="12"
        class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-xs font-mono text-slate-100 focus:outline-none focus:border-cyan-500 resize-y"></textarea>
      <div class="flex items-center justify-between gap-2">
        <span id="ei-status" class="text-[11px] text-cyan-400 font-bold min-h-[1rem]"></span>
        <div class="flex gap-2">
          <button id="ei-copy-btn" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-100 text-xs font-extrabold py-1.5 px-3 rounded-lg transition flex items-center gap-1.5">
            <i class="fa-solid fa-copy"></i> Copy
          </button>
          <button id="ei-import-btn" class="bg-cyan-700 hover:bg-cyan-600 border border-cyan-500/30 text-white text-xs font-extrabold py-1.5 px-3 rounded-lg transition flex items-center gap-1.5 disabled:opacity-50 disabled:cursor-not-allowed">
            <i class="fa-solid fa-file-import"></i> Import
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail modal: learnset (Pokémon → moves) and learned-by (move → Pokémon) -->
  <div id="detail-modal" class="hidden fixed inset-0 z-[300] flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4">
    <div class="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-md flex flex-col gap-3 p-5 max-h-[80vh]">
      <div class="flex items-center justify-between gap-3 border-b border-slate-700 pb-3">
        <div class="min-w-0">
          <h3 id="detail-modal-title" class="text-sm font-extrabold text-amber-400 truncate"></h3>
          <p id="detail-modal-subtitle" class="text-[11px] text-slate-500 mt-0.5"></p>
        </div>
        <button id="detail-modal-close" class="text-slate-400 hover:text-white text-lg leading-none px-1 shrink-0" title="Close">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div id="detail-modal-body" class="overflow-y-auto flex flex-col min-h-0 flex-1"></div>
    </div>
  </div>

  <!-- Script imports -->
  <script type="module" src="app.js?v=1.0.28"></script>
</body>
</html>
