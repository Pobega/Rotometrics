<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rotometrics - VGC Spread Optimizer</title>
    <!-- Favicon: Rotom (PokéAPI Gen-8 menu icon), served locally so it overrides
       the GitHub Pages domain-root /favicon.ico fallback. -->
    <link rel="icon" type="image/png" href="favicon.png" />
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Preact + htm via CDN importmap (zero-build, same philosophy as the Tailwind CDN).
       The calculator's Attacker card is rendered with these; the rest of the page
       is still vanilla during the page-by-page migration. -->
    <script type="importmap">
      {
        "imports": {
          "preact": "https://esm.sh/preact@10.25.4",
          "preact/hooks": "https://esm.sh/preact@10.25.4/hooks",
          "htm": "https://esm.sh/htm@3.1.1"
        }
      }
    </script>
    <style>
      /* Custom styling for neatness */
      .pokemon-card {
        transition: all 0.3s ease;
      }
      .pokemon-card:hover {
        transform: translateY(-2px);
      }
      /* Style native dropdown select options to respect night mode on all platforms */
      select option {
        background-color: #1e293b !important; /* bg-slate-800 */
        color: #f1f5f9 !important; /* text-slate-100 */
      }
      select option:hover {
        background-color: #334155 !important; /* bg-slate-700 */
      }
      /* Hide native number-input spinner arrows (Chrome/Safari + Firefox) */
      input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      /* Rotom electric aura: a faint plasma pulse on the live damage HUD/overlay,
         cross-fading between Rotom's electric-blue charge and its orange plasma
         glow. The glow lives on two stacked pseudo-elements whose OPACITY animates
         (compositor-only) — animating box-shadow directly flickers when the host
         also has backdrop-blur, so we keep the host static and pulse a layer behind it. */
      .rotom-aura { position: relative; isolation: isolate; }
      .rotom-aura::before,
      .rotom-aura::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        z-index: -1;
        animation: rotom-aura 4s ease-in-out infinite;
      }
      .rotom-aura::before { box-shadow: 0 0 20px -3px rgba(56,189,248,0.55); }   /* electric blue */
      .rotom-aura::after  { box-shadow: 0 0 22px -3px rgba(251,146,60,0.50); animation-delay: -2s; } /* plasma orange */
      @keyframes rotom-aura { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .rotom-aura::before { animation: none; opacity: 0.8; }
        .rotom-aura::after  { animation: none; opacity: 0; }
      }
    </style>
  </head>
  <body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <!-- Compact Responsive Header -->
    <header class="bg-slate-800 border-b border-slate-700 py-3 px-4 sm:px-6 shadow-md">
      <div
        class="max-w-[1440px] mx-auto flex flex-col gap-2.5 sm:flex-row sm:items-center sm:gap-4"
      >
        <!-- Top row on mobile: brand on the left, the format pill + Load Sample +
           Export/Import on the right. `sm:contents` flattens this wrapper so on
           desktop its children sit inline on the single header row again. -->
        <div class="flex items-center gap-2 max-[360px]:gap-1 w-full sm:w-auto sm:contents">
          <!-- Logo / Title (Compact). mr-auto pushes the controls to the right. -->
          <div class="flex items-center gap-2.5 max-[360px]:gap-1.5 min-w-0 mr-auto">
            <!-- Brand Rotom sprite: Preact Brand island (tints its glow to the format). -->
            <div
              id="brand-rotom-root"
              class="flex items-center justify-center w-14 h-14 sm:w-11 sm:h-11 shrink-0"
            ></div>
            <div class="min-w-0">
              <h1
                id="brand-title"
                class="text-lg sm:text-base font-black tracking-wider bg-gradient-to-r from-amber-400 via-orange-500 to-sky-400 bg-clip-text text-transparent uppercase truncate"
              >
                Rotometrics
              </h1>
              <p
                id="brand-subtitle"
                class="text-[10px] sm:text-[9px] text-slate-400 font-semibold tracking-wider uppercase truncate block"
              >
                Calculator
              </p>
            </div>
          </div>
          <!-- Regulation selector island. Rides the top row beside the brand on
             mobile; sm:order-2 keeps it after the nav toggle on the flattened
             desktop row. -->
          <div id="format-selector-root" class="shrink-0 sm:order-2"></div>
        </div>

        <!-- Second row on mobile: the page-nav toggle + Load Sample + Export/Import.
           sm:contents flattens this wrapper so the nav pill (sm:order-1) and the
           Load/Export island (sm:order-3) drop back inline on the desktop row. -->
        <div class="flex items-center gap-2 w-full sm:w-auto sm:contents">
          <!-- View Toggle: big tap targets (each button flex-1, taller, larger glyph). -->
          <div
            class="flex-1 sm:flex-none sm:order-1 flex items-center bg-slate-900 border border-slate-700 rounded-lg p-1 gap-1 sm:p-0.5 sm:gap-0.5"
          >
            <button
              id="nav-calculator"
              class="flex-1 sm:flex-none flex items-center justify-center text-sm sm:text-[10px] font-extrabold uppercase tracking-wider py-2.5 sm:py-1.5 px-2 sm:px-2.5 rounded-md transition bg-amber-950/40 text-amber-400 shadow"
            >
              <i class="fa-solid fa-meteor sm:hidden"></i
              ><span class="hidden sm:inline">Calculator</span>
            </button>
            <button
              id="nav-pokedex"
              class="flex-1 sm:flex-none flex items-center justify-center text-sm sm:text-[10px] font-extrabold uppercase tracking-wider py-2.5 sm:py-1.5 px-2 sm:px-2.5 rounded-md transition text-slate-400 hover:text-white"
            >
              <i class="fa-solid fa-book sm:hidden"></i
              ><span class="hidden sm:inline">Pokédex</span>
            </button>
            <button
              id="nav-attackdex"
              class="flex-1 sm:flex-none flex items-center justify-center text-sm sm:text-[10px] font-extrabold uppercase tracking-wider py-2.5 sm:py-1.5 px-2 sm:px-2.5 rounded-md transition text-slate-400 hover:text-white"
            >
              <i class="fa-solid fa-burst sm:hidden"></i
              ><span class="hidden sm:inline">Attackdex</span>
            </button>
            <button
              id="nav-abilitydex"
              class="flex-1 sm:flex-none flex items-center justify-center text-sm sm:text-[10px] font-extrabold uppercase tracking-wider py-2.5 sm:py-1.5 px-2 sm:px-2.5 rounded-md transition text-slate-400 hover:text-white"
            >
              <i class="fa-solid fa-atom sm:hidden"></i
              ><span class="hidden sm:inline">Abilitydex</span>
            </button>
          </div>
          <!-- Load Sample + Export/Import: Preact HeaderControls island. `contents`
             keeps the two buttons as direct flex items of this row (sm:order-3). -->
          <div id="header-controls-root" class="contents"></div>
        </div>
      </div>
    </header>

    <!-- Desktop damage HUD. A self-contained card above the calculator grid that
       sticks to the top of the viewport (floating, with a small gap) once you scroll
       past it. Visible on lg+ only. Kept outside #page-calculator so it can stay
       pinned across the whole scroll. -->
    <div id="results-hud" class="hidden lg:block sticky top-3 lg:top-4 z-40 mt-5 lg:mt-6">
      <!-- Preact ResultsHUD island (desktop variant) mounts here. -->
    </div>
    <!-- #results-hud -->

    <!-- Main Layout Container (Spacious 1440p Expanded Width with Mobile bottom pad cushion!) -->
    <main
      id="page-calculator"
      class="max-w-[1440px] mx-auto p-5 lg:p-6 pb-28 lg:pb-6 grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-6"
    >
      <!-- Mobile Navigation Tabs (Sticky Floating Bar visible only on mobile < lg!) -->
      <div
        class="lg:hidden col-span-1 sticky top-0 z-[100] flex border border-slate-700 bg-slate-950/95 backdrop-blur-md rounded-2xl p-1.5 gap-1.5 mb-3.5 shadow-lg"
      >
        <button
          id="mob-tab-attacker"
          class="flex-1 text-center py-2.5 text-xs font-extrabold rounded-xl transition flex items-center justify-center gap-1 text-slate-400 hover:text-white"
        >
          <i class="fa-solid fa-hand-fist"></i> Attacker
        </button>
        <button
          id="mob-tab-results"
          class="flex-1 text-center py-2.5 text-xs font-extrabold rounded-xl transition flex items-center justify-center gap-1 bg-amber-950/30 text-amber-400 border border-amber-900/30 shadow"
        >
          <i class="fa-solid fa-meteor"></i> Battle & Calcs
        </button>
        <button
          id="mob-tab-defender"
          class="flex-1 text-center py-2.5 text-xs font-extrabold rounded-xl transition flex items-center justify-center gap-1 text-slate-400 hover:text-white"
        >
          <i class="fa-solid fa-shield-halved"></i> Defender
        </button>
      </div>

      <!-- LEFT COLUMN: Attacker (4/12) (Visual Column Envelope Outline!) -->
      <section
        id="panel-attacker"
        class="hidden lg:flex lg:flex-col lg:col-span-4 gap-7 lg:gap-5 bg-slate-950/20 border border-slate-800/80 rounded-3xl p-5 lg:p-4"
      >
        <!-- Preact AttackerCard island mounts here (src/ui-preact/AttackerCard.js).
           The section wrapper + #panel-attacker id stay so mobile tabbing still works. -->
      </section>

      <!-- CENTER COLUMN: Results & Controls (4/12) (Visual Column Envelope Outline!) -->
      <section
        id="panel-center"
        class="hidden lg:flex lg:flex-col lg:col-span-4 gap-7 lg:gap-5 bg-slate-950/20 border border-slate-800/80 rounded-3xl p-5 lg:p-4"
      >
        <!-- Preact CenterPanel island mounts here (Modifiers + Move + Optimizer;
           src/ui-preact/OptimizerPanel.js -> CenterPanel). -->
      </section>

      <!-- RIGHT COLUMN: Defender (4/12) (Visual Column Envelope Outline!) -->
      <section
        id="panel-defender"
        class="hidden lg:flex lg:flex-col lg:col-span-4 gap-7 lg:gap-5 bg-slate-950/20 border border-slate-800/80 rounded-3xl p-5 lg:p-4"
      >
        <!-- Preact DefenderCard island mounts here (src/ui-preact/DefenderCard.js). -->
      </section>
    </main>

    <!-- POKÉDEX PAGE (full-width species stats browser; hidden until toggled) -->
    <!-- Pokédex page: rendered by the Preact DexView island (src/ui-preact/DexView.js),
       mounted here by App.js. PageNav keeps toggling this container's visibility. -->
    <main id="page-pokedex" class="hidden max-w-[1440px] mx-auto p-5 lg:p-6 pb-28 lg:pb-6"></main>

    <!-- Attackdex: a move browser parallel to the Pokédex. Rendered by the Preact
       AttackdexView island (src/ui-preact/AttackdexView.js), mounted here by
       App.js. Hidden by default; toggled via #nav-attackdex through PageNav. -->
    <main id="page-attackdex" class="hidden max-w-[1440px] mx-auto p-5 lg:p-6 pb-28 lg:pb-6"></main>

    <!-- Abilitydex: an ability browser parallel to the Attackdex. Rendered by the
       Preact AbilitydexView island (src/ui-preact/AbilitydexView.js), mounted here
       by App.js. Hidden by default; toggled via #nav-abilitydex through PageNav. -->
    <main
      id="page-abilitydex"
      class="hidden max-w-[1440px] mx-auto p-5 lg:p-6 pb-28 lg:pb-6"
    ></main>

    <!-- Premium Mobile Sticky Floating Damage Overlay (Visible ONLY on mobile < lg width!) -->
    <div
      id="mobile-floating-overlay"
      class="rotom-aura lg:hidden fixed bottom-0 left-0 right-0 z-[999] bg-slate-900/96 backdrop-blur-md border-t border-slate-700 px-5 py-3.5 flex flex-col gap-2.5 shadow-[0_-10px_35px_rgba(0,0,0,0.65)] transition-transform duration-300 text-left"
    >
      <!-- Preact ResultsHUD island (mobile variant) mounts here. -->
    </div>
    <!-- Shared site footer: one muted line of attribution + links. Lives outside
       the toggled #page-* mains so it shows on every view. The mobile bottom pad
       clears the fixed #mobile-floating-overlay (z-999) on small screens. -->
    <footer
      class="border-t border-slate-800 mt-8 py-4 px-4 pb-28 lg:pb-4 text-center text-[11px] leading-relaxed text-slate-500"
    >
      <span class="font-semibold text-slate-400">Rotometrics</span>
      <span class="mx-1.5">·</span>
      <a
        href="https://github.com/Pobega/Rotometrics"
        class="hover:text-slate-300 transition"
        target="_blank"
        rel="noopener"
      >
        <i class="fa-brands fa-github"></i> GitHub
      </a>
      <span class="mx-1.5">·</span>
      <a
        href="https://github.com/Pobega/Rotometrics/blob/main/LICENSE"
        class="hover:text-slate-300 transition"
        target="_blank"
        rel="noopener"
      >
        Apache 2.0
      </a>
      <span class="mx-1.5">·</span>
      <a
        href="https://pokeapi.co/"
        class="hover:text-slate-300 transition"
        target="_blank"
        rel="noopener"
      >
        Data from PokeAPI
      </a>
      <span class="mx-1.5">·</span>
      <span
        >Not affiliated with Nintendo / Game Freak / The Pokémon Company. Pokémon and all related
        names are trademarks of their respective owners.</span
      >
    </footer>

    <!-- Export / Import matchup modal (hidden until opened from the header) -->
    <!-- Export / Import modal: rendered by the Preact ExportImportModal island. -->
    <div id="ei-modal-root"></div>

    <!-- Detail modal (learnset / learned-by): rendered by the Preact DetailModal
       island (src/ui-preact/DetailModal.js), mounted here by App.js. -->
    <div id="detail-modal-root"></div>

    <!-- Script imports -->
    <script type="module" src="App.js?v=1.0.31"></script>
  </body>
</html>
